/* ── UTILITIES ── */
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function daysBetween(from,to){return Math.round((new Date(to+'T00:00:00')-new Date(from+'T00:00:00'))/86400000);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDateLong(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fmtMonthYear(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});}

function getSuggestions(prefs,count=2,exclude=[]){
  const cats=[...new Set(prefs.flatMap(p=>PREF_TO_CATS[p]||[]))];
  const pool=Object.keys(PLACES).filter(id=>!exclude.includes(id));
  const matches=cats.length>0?pool.filter(id=>cats.includes(PLACES[id].cat)):pool;
  const use=matches.length>=count?matches:[...matches,...pool.filter(id=>!matches.includes(id))];
  return use.slice(0,count).map(bp);
}

/* ── API CLIENT ── (same-origin Cloudflare Worker; all calls fail soft) */
const API={
  async suggest(prefs,places){
    try{
      const r=await fetch('/api/suggest',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({prefs,places:places.map(p=>({id:p.id,name:p.name,area:p.area,cat:p.catLabel||p.cat,digest:p.digest||p.note||p.reason||''}))})});
      if(!r.ok) return null;
      const d=await r.json();
      return Array.isArray(d.ranked)&&d.ranked.length?d.ranked:null;
    }catch{return null;}
  },
  async places(query,area,limit=10){
    try{
      const r=await fetch('/api/places',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({query,area,limit})});
      const d=await r.json();
      if(!r.ok) return {error:d.error||'error',message:d.message,places:[]};
      return {places:Array.isArray(d.places)?d.places:[]};
    }catch{return {error:'network',message:'Could not reach the server.',places:[]};}
  },
};

function bp(id) {
  const p=PLACES[id], c=CATS[p.cat]||CATS.nbhd;
  return {id,catLabel:c.label,catGrad:c.grad,...p};
}

function sc(openNow) {
  if(openNow==='open')  return {dot:'#14A06E',ink:'#0E865B',soft:'#D6F5E6',label:'Open now'};
  if(openNow==='soon')  return {dot:'#ECA800',ink:'#C98A00',soft:'#FCEFCF',label:'Closing soon'};
  return                       {dot:'#9092AD',ink:'#6C6E8E',soft:'#ECEDF6',label:'Closed'};
}

/* ── MAP ── */
function AnchorMap({pins=[],connect=true,height='100%'}) {
  const route=pins.filter(p=>p.kind!=='you').map(p=>`${p.x},${p.y}`).join(' ');

    <div style={{position:'relative',width:'100%',height,overflow:'hidden',background:'#E9EBF3'}}>
      <svg viewBox="0 0 390 360" preserveAspectRatio="xMidYMid slice"
        style={{position:'absolute',inset:0,width:'100%',height:'100%',display:'block'}}>
        <rect width="390" height="360" fill="#E9EBF3"/>
        <path d="M250 360 C265 300 320 286 390 292 L390 360 Z" fill="#CFE3EE"/>
        <path d="M-20 120 C70 150 120 210 210 250 C275 279 320 300 360 360 L335 360 C300 312 250 292 195 268 C110 230 60 178 -20 152 Z" fill="#CFE3EE" opacity=".85"/>
        <rect x="36" y="46" width="78" height="58" rx="14" fill="#D8ECDB"/>
        <rect x="292" y="120" width="74" height="64" rx="16" fill="#D8ECDB"/>
        <g fill="#F4F5FA">
          {[[132,36,60,44],[200,30,52,40],[262,40,58,50],[40,120,56,48],[104,116,46,40],
            [158,96,62,46],[228,96,48,42],[40,186,62,52],[112,176,52,46],[248,170,56,44],
            [316,206,52,48],[44,262,58,50],[116,246,48,42],[232,248,46,40]].map(([x,y,w,h],i)=>(
            <rect key={i} x={x} y={y} width={w} height={h} rx="7"/>
          ))}
        </g>
        <g fill="#EAEBF4">
          <rect x="196" y="78" width="26" height="58" rx="6"/>
          <rect x="100" y="60" width="26" height="50" rx="6"/>
          <rect x="300" y="100" width="22" height="92" rx="6"/>
          <rect x="170" y="160" width="68" height="22" rx="6"/>
        </g>
        <g stroke="#fff" strokeLinecap="round" fill="none">
          <path d="M0 92 L390 70" strokeWidth="6"/>
          <path d="M0 160 L300 150 L390 196" strokeWidth="6"/>
          <path d="M30 0 L70 360" strokeWidth="5"/>
          <path d="M150 0 L196 300" strokeWidth="5"/>
          <path d="M250 0 L300 250" strokeWidth="5"/>
          <path d="M0 240 L240 240" strokeWidth="4" opacity=".8"/>
        </g>
      </svg>
      {connect&&route&&(
        <svg viewBox="0 0 100 100" preserveAspectRatio="none"
          style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
          <polyline points={route} fill="none" stroke="#8B72FB" strokeWidth="2.5"
            strokeDasharray="1.5 3" strokeLinecap="round" strokeLinejoin="round"
            vectorEffect="non-scaling-stroke" opacity=".9"/>
        </svg>
      )}
      {pins.map((pin,i)=>{
        const isYou=pin.kind==='you',isAnc=pin.kind==='anchor';
        const color=isAnc?'#FB7242':'#6C5CE7';
        const big=pin.big,w=big?38:30,h=big?48:38;
        return (
          <div key={pin.id||i} style={{position:'absolute',left:pin.x+'%',top:pin.y+'%',
            transform:'translate(-50%,-100%)',zIndex:big?30:isAnc?20:12}}>
            {isYou?(
              <div style={{transform:'translateY(50%)'}}>
                <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
                  width:34,height:34,borderRadius:'50%',background:'rgba(108,92,231,0.18)'}}/>
                <div style={{position:'relative',width:18,height:18,borderRadius:'50%',
                  background:'#6C5CE7',border:'3px solid #fff',boxShadow:'0 2px 6px rgba(108,92,231,0.45)'}}/>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',
                filter:`drop-shadow(0 6px 10px ${isAnc?'rgba(251,114,66,0.45)':'rgba(108,92,231,0.40)'})`}}>

            )}

        );

  );
}

  return (
    <div style={{display:'flex',flexDirection:'column',padding:'4px 18px 8px'}}>
      {stops.map((s)=>{
        const isAnc=s.kind==='anchor'||s.kind==='hotel';
        const isHotel=s.kind==='hotel';
        const nodeBg=isAnc?'#FB7242':s.added?'#6C5CE7':'#F1EEFF';

                <div onClick={()=>!isHotel&&onOpen&&onOpen(s.id)} style={{background:'#fff',borderRadius:20,
                  boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 6px 16px rgba(22,23,42,0.07)',overflow:'hidden',cursor:isHotel?'default':'pointer'}}>
                  <div style={{display:'flex',gap:12,padding:'13px 14px'}}>
                    <div style={{width:52,height:52,borderRadius:14,flexShrink:0,background:s.catGrad,
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {isHotel?(
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>

                          <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22Z"/><circle cx="12" cy="10" r="3"/>
                        </svg>
                      )}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                        <span style={{display:'inline-flex',alignItems:'center',gap:4,background:isHotel?'#E4DEFF':'#FFE2D4',color:isHotel?'#5A48D6':'#ED5A2A',
                          fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:11,letterSpacing:'0.04em',
                          textTransform:'uppercase',padding:'3px 8px',borderRadius:999}}>
                          <AnchorIco size={11} color={isHotel?'#5A48D6':'#ED5A2A'}/> {isHotel?'Hotel':'Anchor'}
                        </span>
                        {!isHotel&&<StatusPill openNow={s.openNow} small/>}
                      </div>
                      <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,color:'#16172A',marginTop:5,lineHeight:1.15}}>{s.name}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4,flexWrap:'wrap'}}>
                        <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#6C6E8E'}}>{s.area}</span>
                        <Ratings rating={s.rating} tabelogRating={s.tabelogRating}/>
                        <BudgetBadge budget={s.budget}/>
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:9,padding:'11px 14px',background:'#FFF6F1',borderTop:'1px solid #FFE9DD'}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ED5A2A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,marginTop:1}}>
                      <path d="M9 18h6M10 22h4M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/>
                    </svg>
                    <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#7a4a30',lineHeight:1.4}}>{s.note}</div>
                  </div>
                </div>
              ):(
                <div style={{background:'#fff',borderRadius:20,border:'1.5px dashed #C9BEFF',
                  boxShadow:'0 1px 2px rgba(22,23,42,0.05)',overflow:'hidden'}}>
                  <div onClick={()=>onOpen&&onOpen(s.id)} style={{display:'flex',gap:12,padding:'13px 14px',cursor:'pointer'}}>
                    <div style={{width:52,height:52,borderRadius:14,flexShrink:0,background:s.catGrad,
                      display:'flex',alignItems:'center',justifyContent:'center',opacity:.95}}>
                      <SparkleIco size={22}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                        <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#F1EEFF',color:'#5A48D6',
                          fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:11,letterSpacing:'0.04em',
                          textTransform:'uppercase',padding:'3px 8px',borderRadius:999}}>
                          {s.aiPick&&<SparkleIco size={11} color="#5A48D6"/>}{s.aiPick?'AI pick':'Suggested'}
                        </span>
                        <StatusPill openNow={s.openNow} small/>
                      </div>
                      <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,color:'#16172A',marginTop:5,lineHeight:1.15}}>{s.name}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4,flexWrap:'wrap'}}>
                        <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#6C6E8E'}}>{s.area}</span>
                        <Ratings rating={s.rating} tabelogRating={s.tabelogRating}/>
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:9,padding:'0 14px 12px'}}>
                    <SparkleIco size={16} color="#8B72FB"/>
                    <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,color:'#4836B4',lineHeight:1.45,fontStyle:'italic',opacity:s.aiLoading?0.5:1}}>{s.aiLoading?'Finding your best fits…':s.reason}</div>
                  </div>
                  {s.added?(
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,
                      padding:'11px 14px',background:'#F1EEFF',borderTop:'1px solid #E4DEFF'}}>
                      <span style={{display:'inline-flex',alignItems:'center',gap:6,
                        fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:13.5,color:'#5A48D6'}}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5A48D6" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                        Added to your day

                      <button onClick={()=>onSkip&&onSkip(s.id)} style={{border:'none',background:'transparent',fontWeight:600,fontSize:13.5,color:'#9092AD',cursor:'pointer',padding:4}}>Remove</button>
                    </div>
                  ):(
                    <div style={{display:'flex',gap:10,padding:'11px 14px',background:'#FAFAFD',borderTop:'1px solid #ECEDF6'}}>
                      <button onClick={()=>onAdd&&onAdd(s.id)} style={{flex:1,border:'none',background:'#6C5CE7',color:'#fff',fontWeight:600,fontSize:14,padding:10,borderRadius:12,cursor:'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,boxShadow:'0 4px 12px rgba(108,92,231,0.28)'}}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
                        Add to day
                      </button>
                      <button onClick={()=>onSkip&&onSkip(s.id)} style={{border:'1.5px solid #E3E5F0',background:'#fff',color:'#6C6E8E',fontWeight:600,fontSize:14,padding:'10px 16px',borderRadius:12,cursor:'pointer'}}>Skip</button>
                    </div>
                  )}
                </div>
              )}
              {s.travel&&(
                <div style={{display:'flex',alignItems:'center',gap:7,padding:'11px 2px 3px',color:'#9092AD',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12.5}}>
                  <WalkIco size={15} color="#B6B8CC"/> {s.travel}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── ONBOARDING ── */
function OBProgress({cur}){
  return(
    <div style={{display:'flex',gap:7,justifyContent:'center',padding:'6px 0'}}>
      {[1,2,3].map(n=>(
        <div key={n} style={{height:6,borderRadius:999,transition:'all .25s',
          background:n===cur?'#6C5CE7':n<cur?'#A793FF':'#E3E5F0',
          width:n===cur?22:6}}/>
      ))}
    </div>
  );
}

function OBBack({onClick}){
  return(
    <button onClick={onClick} style={{width:48,height:48,borderRadius:14,border:'1.5px solid #E3E5F0',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
  );
}

function OnboardingFlow({onComplete,initialData}){
  const [step,setStep]=useState(initialData?1:0);
  const [arrive,setArrive]=useState(initialData?.arrivalDate||'');
  const [nights,setNights]=useState(initialData?.nights||4);
  const [hotelName,setHotelName]=useState(initialData?.anchors?.[0]?.name||'');
  const [hotelArea,setHotelArea]=useState(initialData?.anchors?.[0]?.area||'');
  const [prefs,setPrefs]=useState(initialData?.prefs||[]);
  const depart=arrive?addDays(arrive,nights):'';

  const finish=()=>{
    const anchors=hotelName.trim()?[{id:'anc-0',name:hotelName.trim(),area:hotelArea||'Tokyo',checkin:arrive||todayStr(),checkout:depart||addDays(arrive||todayStr(),nights)}]:[];
    onComplete({destination:'Tokyo',arrivalDate:arrive||todayStr(),departureDate:depart||addDays(arrive||todayStr(),nights),nights,anchors,prefs,anchoredPlaces:initialData?.anchoredPlaces||[]});
  };

  if(step===0) return(
    <div style={{position:'absolute',inset:0,background:'linear-gradient(160deg,#1A1040 0%,#2D1B69 55%,#16172A 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',textAlign:'center'}}>
      <div style={{marginBottom:20}}><AnchorIco size={52} color="#FB7242"/></div>
      <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:56,color:'#fff',letterSpacing:'-0.03em',lineHeight:1}}>Anchor</div>
      <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:18,color:'rgba(255,255,255,0.6)',marginTop:10,marginBottom:48}}>Your Tokyo companion</div>
      <div style={{width:'100%',background:'rgba(255,255,255,0.08)',borderRadius:20,padding:'18px 20px',marginBottom:24,textAlign:'left'}}>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.4)',letterSpacing:'0.10em',textTransform:'uppercase',marginBottom:14}}>Set up in 3 steps</div>
        {[['✈','Your arrival & trip length'],['🏨','Your hotel (your anchor)'],['🍜','Your travel style']].map(([e,t])=>(
          <div key={t} style={{display:'flex',alignItems:'center',gap:13,marginBottom:11}}>
            <span style={{fontSize:20,width:30,textAlign:'center'}}>{e}</span>
            <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'rgba(255,255,255,0.8)'}}>{t}</span>
          </div>
        ))}
      </div>
      <button onClick={()=>setStep(1)} style={{width:'100%',background:'#FB7242',color:'#fff',border:'none',borderRadius:18,padding:'18px 24px',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:20,cursor:'pointer',boxShadow:'0 8px 32px rgba(251,114,66,0.50)'}}>
        Plan your trip →
      </button>
    </div>
  );

  if(step===1) return(
    <div style={{position:'absolute',inset:0,background:'#FAFAFD',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'24px 22px 0'}}>
        <OBProgress cur={1}/>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:32,color:'#16172A',marginTop:18,letterSpacing:'-0.02em',lineHeight:1.1}}>When are you<br/>going to Tokyo?</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'28px 22px',display:'flex',flexDirection:'column',gap:22}}>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>Arriving</div>
          <input type="date" value={arrive} min={todayStr()} onChange={e=>setArrive(e.target.value)}
            style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:16,padding:'15px 16px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:17,color:'#16172A',background:'#fff',outline:'none'}}/>
        </div>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>How many nights?</div>
          <div style={{display:'flex',alignItems:'center',gap:16,background:'#fff',border:'1.5px solid #E3E5F0',borderRadius:16,padding:'10px 16px'}}>
            <button onClick={()=>setNights(n=>Math.max(1,n-1))} style={{width:40,height:40,borderRadius:'50%',border:'1.5px solid #E3E5F0',background:'#fff',fontSize:24,cursor:'pointer',color:'#6C5CE7',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
            <div style={{flex:1,textAlign:'center'}}>
              <span style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:34,color:'#16172A'}}>{nights}</span>
              <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:16,color:'#9092AD',marginLeft:8}}>nights</span>
            </div>
            <button onClick={()=>setNights(n=>Math.min(30,n+1))} style={{width:40,height:40,borderRadius:'50%',border:'1.5px solid #E3E5F0',background:'#fff',fontSize:24,cursor:'pointer',color:'#6C5CE7',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
          </div>
        </div>
        {arrive&&(
          <div style={{background:'#F1EEFF',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:10}}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
            <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,fontWeight:600,color:'#5A48D6'}}>{fmtDateLong(arrive)} → {fmtDateLong(depart)} · {nights} {nights===1?'night':'nights'}</span>
          </div>
        )}
      </div>
      <div style={{padding:'0 22px 40px',display:'flex',gap:12}}>
        <OBBack onClick={()=>setStep(0)}/>
        <button disabled={!arrive} onClick={()=>setStep(2)} style={{flex:1,height:52,border:'none',borderRadius:16,background:arrive?'#6C5CE7':'#E3E5F0',color:arrive?'#fff':'#9092AD',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,cursor:arrive?'pointer':'default',transition:'background .15s'}}>
          Next →
        </button>
      </div>
    </div>
  );

  if(step===2) return(
    <div style={{position:'absolute',inset:0,background:'#FAFAFD',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'24px 22px 0'}}>
        <OBProgress cur={2}/>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:32,color:'#16172A',marginTop:18,letterSpacing:'-0.02em',lineHeight:1.1}}>Where are you<br/>staying?</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',marginTop:7}}>Add your hotel — it becomes your anchor.</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'24px 22px',display:'flex',flexDirection:'column',gap:20}}>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>Hotel / Airbnb name</div>
          <input type="text" value={hotelName} onChange={e=>setHotelName(e.target.value)} placeholder="e.g. Park Hyatt Tokyo"
            style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:16,padding:'15px 16px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:17,color:'#16172A',background:'#fff',outline:'none'}}/>
        </div>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>Neighborhood</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {TOKYO_AREAS.map(a=>(
              <button key={a} onClick={()=>setHotelArea(a===hotelArea?'':a)}
                style={{padding:'9px 16px',borderRadius:999,border:'none',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:14,cursor:'pointer',transition:'all .15s',
                  background:a===hotelArea?'#6C5CE7':'#fff',color:a===hotelArea?'#fff':'#4E5072',
                  boxShadow:a===hotelArea?'0 3px 10px rgba(108,92,231,0.35)':'0 1px 2px rgba(22,23,42,0.06)',
                  outline:'1.5px solid '+(a===hotelArea?'transparent':'#E3E5F0')}}>
                {a}
              </button>
            ))}
          </div>
        </div>
        {arrive&&(
          <div style={{background:'#FFF6F1',borderRadius:14,padding:'13px 16px',display:'flex',alignItems:'center',gap:10}}>
            <AnchorIco size={16} color="#FB7242"/>
            <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,fontWeight:600,color:'#ED5A2A'}}>{fmtDate(arrive)} – {fmtDate(depart)} · {nights} nights</span>
          </div>
        )}
        <button onClick={()=>setStep(3)} style={{border:'none',background:'none',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#9092AD',cursor:'pointer',textDecoration:'underline',textAlign:'center',padding:'4px 0'}}>Skip for now</button>
      </div>
      <div style={{padding:'0 22px 40px',display:'flex',gap:12}}>
        <OBBack onClick={()=>setStep(1)}/>
        <button onClick={()=>setStep(3)} style={{flex:1,height:52,border:'none',borderRadius:16,background:'#6C5CE7',color:'#fff',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,cursor:'pointer'}}>
          Next →
        </button>
      </div>
    </div>
  );

  if(step===3) return(
    <div style={{position:'absolute',inset:0,background:'#FAFAFD',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'24px 22px 0',flexShrink:0}}>
        <OBProgress cur={3}/>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:32,color:'#16172A',marginTop:18,letterSpacing:'-0.02em',lineHeight:1.1}}>What do you<br/>love?</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',marginTop:7,marginBottom:4}}>Pick your Tokyo vibe — we'll shape suggestions around you.</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'18px 22px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,alignContent:'start'}}>
        {PREF_OPTS.map(p=>{
          const on=prefs.includes(p.id);
          const cat=CATS[p.cat]||CATS.food;
          return(
            <button key={p.id} onClick={()=>setPrefs(prev=>on?prev.filter(x=>x!==p.id):[...prev,p.id])}
              style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:7,padding:'15px 14px 13px',borderRadius:18,
                border:`2px solid ${on?'#6C5CE7':'transparent'}`,
                background:on?'#F1EEFF':'#fff',
                boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 5px 14px rgba(22,23,42,0.06)',
                cursor:'pointer',textAlign:'left',position:'relative',transition:'all .15s'}}>
              <div style={{width:38,height:38,borderRadius:11,background:cat.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:21}}>
                {p.emoji}
              </div>
              <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:14,color:on?'#5A48D6':'#353756',lineHeight:1.2}}>{p.label}</span>
              {on&&<div style={{position:'absolute',top:10,right:10}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </div>}
            </button>
          );
        })}
      </div>
      <div style={{padding:'12px 22px 40px',display:'flex',gap:12,flexShrink:0}}>
        <OBBack onClick={()=>setStep(2)}/>
        <button onClick={finish} style={{flex:1,height:52,border:'none',borderRadius:16,background:'linear-gradient(135deg,#6C5CE7,#FB7242)',color:'#fff',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,cursor:'pointer',boxShadow:'0 8px 24px rgba(108,92,231,0.35)'}}>
          Let's go! ✈
        </button>
      </div>
    </div>
  );

  return null;
}

/* ── TODAY ── */
const segBase={border:'none',background:'transparent',fontWeight:600,fontSize:13,color:'#6C6E8E',padding:'6px 14px',borderRadius:999,cursor:'pointer',transition:'all .15s'};
const segOn={...segBase,background:'#fff',color:'#16172A',boxShadow:'0 1px 3px rgba(22,23,42,0.14)'};

function TodayScreen({layout,setLayout,push,added,setAdded,trip,onEditTrip,goTab}){
  const today=todayStr();
  const dayIndex=trip.arrivalDate?daysBetween(trip.arrivalDate,today):0;
  const totalNights=trip.nights||4;
  const isPreTrip=dayIndex<0;
  const isPostTrip=dayIndex>=totalNights;
  const viewDay=Math.max(0,Math.min(totalNights-1,dayIndex));
  const todayAnchor=trip.anchors?.[0]||null;
  const areaLabel=(todayAnchor&&AREA_LABELS[todayAnchor.area])||todayAnchor?.area||'Tokyo';
  const active=!isPreTrip&&!isPostTrip;

  // Static candidate pool; Claude ranks it and writes the per-traveler reasons.
  const pool=useMemo(()=>getSuggestions(trip.prefs||[],8,[]),[JSON.stringify(trip.prefs)]);
  const [ai,setAi]=useState(null);        // [{id,reason}] top AI picks, or null
  const [aiLoading,setAiLoading]=useState(false);
  const prefsKey=JSON.stringify(trip.prefs||[]);
  useEffect(()=>{
    if(!active){return;}
    let dead=false; setAiLoading(true);
    API.suggest(trip.prefs||[],pool).then(ranked=>{
      if(dead) return;
      setAiLoading(false);
      setAi(ranked?ranked.slice(0,2).map(r=>({id:r.id,reason:r.reason})).filter(x=>PLACES[x.id]):null);
    });
    return ()=>{dead=true;};
  },[active,prefsKey]); // eslint-disable-line

  const suggs=(ai&&ai.length)
    ? ai.map(r=>({...bp(r.id),reason:r.reason,aiPick:true}))
    : pool.slice(0,2);

  const dayStops=[
    ...(todayAnchor?[{id:'hotel-0',name:todayAnchor.name,area:todayAnchor.area,kind:'hotel',num:1,time:'Check-in',catGrad:CATS.stay.grad,rating:null,tabelogRating:null,openNow:'open',budget:null,note:'Your anchor for this leg of the trip.',hasLine:suggs.length>0}]:[]),
    ...suggs.map((p,i)=>({...p,kind:'suggest',num:(todayAnchor?2:1)+i,time:['11:00','18:00'][i]||'14:00',hasLine:i<suggs.length-1,added:!!added[p.id],aiLoading})),
  ];
  const dayPins=[
    ...(todayAnchor?[{id:'hotel-0',x:55,y:40,num:1,kind:'anchor',label:todayAnchor.area}]:[]),
    ...suggs.map((p,i)=>({id:p.id,x:[32,68][i]||50,y:[62,28][i]||50,num:(todayAnchor?2:1)+i,kind:'suggest'})),
    {id:'you',x:46,y:56,kind:'you'},
  ];

  const EditBtn=()=>(
    <button onClick={onEditTrip} style={{width:36,height:36,borderRadius:'50%',border:'1px solid #E3E5F0',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 1px 2px rgba(22,23,42,0.05)',cursor:'pointer'}}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  );

  if(isPreTrip){
    const daysAway=-dayIndex;
    return(
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
        <div style={{flexShrink:0,padding:'20px 18px 14px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#FB7242'}}><AnchorIco size={13}/> {trip.destination}</div>
            <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:24,color:'#16172A',marginTop:3}}>Coming soon</div>
          </div>
          <EditBtn/>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          <div style={{padding:'40px 24px 32px',textAlign:'center',background:'linear-gradient(180deg,#F1EEFF 0%,#FAFAFD 100%)'}}>
            <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:88,color:'#6C5CE7',lineHeight:1}}>{daysAway}</div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:18,color:'#353756',fontWeight:600,marginTop:4}}>{daysAway===1?'day':'days'} until Tokyo</div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#9092AD',marginTop:8}}>{trip.arrivalDate&&fmtDateLong(trip.arrivalDate)} → {trip.departureDate&&fmtDateLong(trip.departureDate)}</div>
            <div style={{display:'inline-block',marginTop:14,background:'#fff',borderRadius:12,padding:'8px 16px',fontFamily:"'Geist Mono',monospace",fontSize:13,color:'#6C5CE7',fontWeight:600,boxShadow:'0 2px 8px rgba(22,23,42,0.08)'}}>{trip.nights} nights · {trip.anchors?.length||0} anchor{trip.anchors?.length!==1?'s':''}</div>
          </div>
          {trip.anchors&&trip.anchors.length>0&&(
            <div style={{padding:'0 18px 16px'}}>
              <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',letterSpacing:'0.10em',textTransform:'uppercase',marginBottom:12}}>Your anchors</div>
              {trip.anchors.map(a=>(
                <div key={a.id} style={{background:'linear-gradient(135deg,#9AA0FF,#6C5CE7)',borderRadius:20,padding:'16px 15px',marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:44,height:44,borderRadius:12,background:'rgba(255,255,255,0.18)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><AnchorIco size={22} color="#fff"/></div>
                  <div>
                    <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:17,color:'#fff',lineHeight:1.1}}>{a.name}</div>
                    <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'rgba(255,255,255,0.7)',marginTop:2}}>{a.area} · {fmtDate(a.checkin)} – {fmtDate(a.checkout)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{padding:'8px 18px 36px'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginBottom:12}}>While you wait, explore what's waiting:</div>
            <button onClick={()=>goTab&&goTab('discover')} style={{width:'100%',background:'#6C5CE7',color:'#fff',border:'none',borderRadius:16,padding:'14px',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:17,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:'0 6px 18px rgba(108,92,231,0.30)'}}>
              <SparkleIco size={18}/> Browse Tokyo picks
            </button>
          </div>
        </div>
      </div>
    );
  }

  if(isPostTrip) return(
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
      <div style={{flexShrink:0,padding:'20px 18px 14px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#FB7242'}}><AnchorIco size={13}/> Tokyo wrapped ✈</div>
          <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:24,color:'#16172A',marginTop:3}}>{trip.arrivalDate&&fmtMonthYear(trip.arrivalDate)}</div>
        </div>
        <EditBtn/>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'48px 24px',textAlign:'center'}}>
        <div style={{fontSize:56,marginBottom:14}}>🎌</div>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:28,color:'#16172A'}}>Tokyo's a wrap!</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',marginTop:8}}>{trip.nights} nights · {trip.anchors?.length||0} anchor{trip.anchors?.length!==1?'s':''}</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#9092AD',marginTop:4}}>{trip.arrivalDate&&fmtDateLong(trip.arrivalDate)} – {trip.departureDate&&fmtDateLong(trip.departureDate)}</div>
        <button onClick={onEditTrip} style={{marginTop:32,background:'#6C5CE7',color:'#fff',border:'none',borderRadius:16,padding:'14px 28px',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:16,cursor:'pointer',boxShadow:'0 6px 18px rgba(108,92,231,0.30)'}}>Plan another trip →</button>
      </div>
    </div>
  );

  return(
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
      <div style={{flexShrink:0,padding:'16px 18px 12px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6',zIndex:5}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#FB7242'}}><AnchorIco size={13}/> {trip.destination}</div>
            <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:26,color:'#16172A',lineHeight:1.05,marginTop:3}}>Day {viewDay+1} · {areaLabel}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <EditBtn/>
            <button onClick={()=>push({type:'trip'})} style={{width:36,height:36,borderRadius:'50%',border:'1px solid #E3E5F0',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 1px 2px rgba(22,23,42,0.05)',cursor:'pointer'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
            </button>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12}}>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#6C6E8E'}}>
            <span style={{fontFamily:"'Geist Mono',monospace",color:'#353756'}}>{trip.arrivalDate&&fmtDateLong(addDays(trip.arrivalDate,viewDay))}</span> · {dayStops.length} stops
          </div>
          <div style={{display:'inline-flex',background:'#ECEDF6',borderRadius:999,padding:3}}>
            {['A','B','C'].map((l,i)=>(
              <button key={l} onClick={()=>setLayout(l)} style={layout===l?segOn:segBase}>{['Map','Sheet','List'][i]}</button>
            ))}
          </div>
        </div>
      </div>

      {layout==='A'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
          <div style={{height:250,flexShrink:0,position:'relative'}}>
            <AnchorMap pins={dayPins} connect height="250px"/>
          </div>
          <div style={{flex:1,overflowY:'auto',paddingTop:8,paddingBottom:24}}>
            <Timeline stops={dayStops} onOpen={id=>push({type:'place',id})}
              onAdd={id=>setAdded(a=>({...a,[id]:true}))} onSkip={id=>setAdded(a=>({...a,[id]:false}))}/>
          </div>
        </div>
      )}
      {layout==='B'&&(
        <div style={{flex:1,position:'relative',minHeight:0}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:200}}>
            <AnchorMap pins={dayPins} connect height="200px"/>
          </div>
          <div style={{position:'absolute',inset:0,overflowY:'auto'}}>
            <div style={{height:158}}/>
            <div style={{position:'relative',background:'#FAFAFD',borderRadius:'26px 26px 0 0',boxShadow:'0 -8px 24px rgba(22,23,42,0.12)',minHeight:420,paddingTop:6,paddingBottom:24}}>
              <div style={{width:40,height:5,borderRadius:999,background:'#D5D6E4',margin:'9px auto 4px'}}/>
              <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',padding:'4px 20px 6px'}}>
                <span style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:17,color:'#16172A'}}>Your day</span>
                <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD'}}>{dayStops.length} stops</span>
              </div>
              <Timeline stops={dayStops} onOpen={id=>push({type:'place',id})}
                onAdd={id=>setAdded(a=>({...a,[id]:true}))} onSkip={id=>setAdded(a=>({...a,[id]:false}))}/>
            </div>
          </div>
        </div>
      )}
      {layout==='C'&&(
        <div style={{flex:1,overflowY:'auto',padding:'14px 18px 24px'}}>
          <div style={{borderRadius:18,overflow:'hidden',height:120,position:'relative',boxShadow:'0 1px 2px rgba(22,23,42,0.06)',marginBottom:4}}>
            <AnchorMap pins={dayPins} connect height="120px"/>
          </div>
          <div style={{margin:'0 -18px'}}>
            <Timeline stops={dayStops} onOpen={id=>push({type:'place',id})}
              onAdd={id=>setAdded(a=>({...a,[id]:true}))} onSkip={id=>setAdded(a=>({...a,[id]:false}))}/>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── SEARCH ── */
function SearchScreen({push}) {
  const [mode,setMode]=useState('saved'); // 'saved' | 'live'
  const [q,setQ]=useState('');
  const [live,setLive]=useState({loading:false,places:[],error:null,for:''});

  // Live Google search — debounced, fails soft.
  useEffect(()=>{
    if(mode!=='live'||q.trim().length<2){return;}
    const term=q.trim();
    let dead=false;
    setLive(l=>({...l,loading:true,error:null}));
    const t=setTimeout(()=>{
      API.places(term,'',12).then(res=>{
        if(dead) return;
        setLive({loading:false,places:res.places||[],error:res.error?(res.message||'Search failed'):null,for:term});
      });
    },450);
    return ()=>{dead=true;clearTimeout(t);};
  },[mode,q]);

  const allPlaces=Object.keys(PLACES).map(bp);
  const results=mode!=='saved'||q.length<2?[]:allPlaces.filter(p=>{
    const s=(p.name+p.area+p.catLabel+(p.note||'')+(p.reason||'')+(p.digest||'')).toLowerCase();
    return s.includes(q.toLowerCase());
  }).map(p=>{
    const qLow=q.toLowerCase();
    let why='';
    if(p.name.toLowerCase().includes(qLow)) why='Name match';
    else if(p.catLabel.toLowerCase().includes(qLow)) why=`Category: ${p.catLabel}`;
    else if(p.area.toLowerCase().includes(qLow)) why=`Neighborhood: ${p.area}`;
    else {
      const text=p.note||p.reason||p.digest||'';
      const idx=text.toLowerCase().indexOf(qLow);
      if(idx>-1) {
        const snip=text.slice(Math.max(0,idx-15),idx+50).trim();
        why=`"…${snip}…"`;
      }
    }
    return {...p,why};
  });
  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
      <div style={{flexShrink:0,padding:'16px 18px 12px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#9092AD'}}>{mode==='saved'?'Search saved':'Search Tokyo · live'}</div>
          <div style={{display:'inline-flex',background:'#ECEDF6',borderRadius:999,padding:3}}>
            {[['saved','Saved'],['live','Tokyo']].map(([k,l])=>(
              <button key={k} onClick={()=>setMode(k)} style={mode===k?segOn:segBase}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{position:'relative'}}>
          <svg style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}
            width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9092AD" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder={mode==='saved'?'Place, neighborhood, dish, note…':'Ramen, coffee, izakaya, a place name…'}
            style={{width:'100%',border:'1.5px solid #E3E5F0',background:'#fff',borderRadius:14,padding:'12px 40px 12px 42px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#16172A',outline:'none'}}/>
          {q&&<button onClick={()=>setQ('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',border:'none',background:'none',color:'#9092AD',fontSize:20,lineHeight:1,padding:2}}>×</button>}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {/* ── LIVE GOOGLE MODE ── */}
        {mode==='live'&&(
          <div style={{padding:'12px 18px 24px'}}>
            {q.trim().length<2&&(
              <div style={{padding:'30px 6px',textAlign:'center'}}>
                <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',lineHeight:1.6}}>Search live Tokyo venues from Google — real ratings, hours, and open status.</div>
              </div>
            )}
            {q.trim().length>=2&&live.loading&&(
              <div style={{padding:'30px 6px',textAlign:'center'}}>
                <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD'}}>Searching Tokyo for "{q.trim()}"…</div>
              </div>
            )}
            {q.trim().length>=2&&!live.loading&&live.error&&(
              <div style={{padding:'24px',textAlign:'center',background:'#FFF1EA',borderRadius:16}}>
                <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#8a4a2c',lineHeight:1.5}}>{live.error}</div>
              </div>
            )}
            {q.trim().length>=2&&!live.loading&&!live.error&&live.places.length===0&&live.for===q.trim()&&(
              <div style={{padding:'30px 6px',textAlign:'center'}}>
                <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD'}}>No Tokyo results for "{q.trim()}"</div>
              </div>
            )}
            {!live.loading&&!live.error&&live.places.length>0&&(
              <>
                <div style={{display:'flex',alignItems:'center',gap:6,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginBottom:10}}>
                  <span>{live.places.length} live results</span>
                  <span style={{color:'#D5D6E4'}}>·</span>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:11.5}}>Google</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {live.places.map((p,i)=><GoogleResultCard key={(p.googleUrl||p.name)+i} p={p}/>)}
                </div>
              </>
            )}
          </div>
        )}

        {/* ── SAVED MODE ── */}
        {mode==='saved'&&q.length<2&&(
          <div style={{padding:'40px 24px',textAlign:'center'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',lineHeight:1.6}}>Search by name, neighborhood, category, or what a place is known for.</div>
          </div>
        )}
        {mode==='saved'&&q.length>=2&&results.length===0&&(
          <div style={{padding:'40px 24px',textAlign:'center'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD'}}>No saved places match "{q}"</div>
          </div>
        )}
        {mode==='saved'&&results.length>0&&(
          <div style={{padding:'10px 18px 24px'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginBottom:10}}>{results.length} {results.length===1?'match':'matches'}</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {results.map(p=>(
                <div key={p.id} onClick={()=>push({type:'place',id:p.id})} style={{background:'#fff',borderRadius:20,padding:'13px 14px',boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 6px 16px rgba(22,23,42,0.06)',cursor:'pointer'}}>
                  <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                    <div style={{width:44,height:44,borderRadius:12,flexShrink:0,background:p.catGrad}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:16,color:'#16172A',lineHeight:1.1}}>{p.name}</div>
                      <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD',marginTop:2}}>{p.area} · {p.catLabel}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6,flexWrap:'wrap'}}>
                        <StatusPill openNow={p.openNow} small/>
                        <Ratings rating={p.rating} tabelogRating={p.tabelogRating}/>
                        <BudgetBadge budget={p.budget}/>
                      </div>
                    </div>
                  </div>
                  {p.why&&(
                    <div style={{marginTop:10,display:'flex',gap:8,alignItems:'flex-start',background:'#F4F5FA',borderRadius:10,padding:'8px 11px'}}>

                      </svg>
                      <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#4836B4',lineHeight:1.4}}>{p.why}</div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'#9092AD',margin:'18px 0 10px'}}>Days</div>
        {days.map((day,i)=>{
          const isToday=day.date===today;
          return(
            <div key={i} style={{marginBottom:12,background:'#fff',borderRadius:20,overflow:'hidden',boxShadow:'0 1px 2px rgba(22,23,42,0.05),0 6px 16px rgba(22,23,42,0.06)',border:isToday?'2px solid #6C5CE7':'2px solid transparent'}}>
              <div style={{padding:'13px 14px',display:'flex',alignItems:'flex-start',justifyContent:'space-between',background:isToday?'#F1EEFF':'transparent'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
                    <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,fontWeight:600,color:isToday?'#6C5CE7':'#9092AD',background:isToday?'#E4DEFF':'#ECEDF6',padding:'2px 8px',borderRadius:999}}>{day.label}</span>
                    {isToday&&<span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,color:'#6C5CE7'}}>Today</span>}
                  </div>
                  <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:16,color:'#16172A'}}>{day.date?fmtDateLong(day.date):''}</div>
                  {day.anchor&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginTop:2}}>{day.anchor.name}</div>}
                </div>
                <ChevRight/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── PLACE DETAIL ── */

  const [note,setNote]=useState('');
  const d=bp(id);
  const isAnc=(trip?.anchoredPlaces||[]).includes(id);
  const pairs=(PAIRS[id]||['blue','nonbei']).map(bp);
  const s=sc(d.openNow);
  const detailPins=[{id:d.id,x:52,y:46,kind:isAnc?'anchor':'suggest',big:true,label:d.area}];

    <div style={{position:'absolute',inset:0,zIndex:40,background:'#FAFAFD',overflowY:'auto',animation:'slideIn .28s cubic-bezier(0.22,1,0.36,1)'}}>

            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#232540" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#232540" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 12 5 5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4 3 5.5l7 7Z"/></svg>
          </button>
        </div>
        <div style={{position:'absolute',left:18,bottom:16,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.92)',borderRadius:999,padding:'5px 11px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,color:'#353756'}}>{d.catLabel}</span>
          {isAnc&&<span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#FFE2D4',color:'#ED5A2A',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,fontSize:11,letterSpacing:'0.04em',textTransform:'uppercase',padding:'4px 9px',borderRadius:999}}><AnchorIco size={10} color="#ED5A2A"/> Anchor</span>}
        </div>
      </div>

      <div style={{padding:'18px 18px 0'}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:10,justifyContent:'space-between'}}>
          <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:25,color:'#16172A',lineHeight:1.08,letterSpacing:'-0.02em',flex:1}}>{d.name}</div>
          <StatusPill openNow={d.openNow}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:7,flexWrap:'wrap'}}>
          <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#6C6E8E'}}>{d.area}</span>
          <span style={{color:'#D5D6E4'}}>·</span>
          <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#6C6E8E'}}>{d.station}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:10,flexWrap:'wrap'}}>
          <Ratings rating={d.rating} tabelogRating={d.tabelogRating} size="md"/>
          <BudgetBadge budget={d.budget}/>
        </div>

        {/* Info cards */}
        <div style={{display:'flex',gap:9,marginTop:16}}>
          <div style={{flex:1,background:'#fff',borderRadius:14,padding:'11px 13px',boxShadow:'0 1px 2px rgba(22,23,42,0.05)'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'#9092AD'}}>Hours</div>
            <div style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:'#353756',marginTop:4,lineHeight:1.4}}>{d.hours}</div>
          </div>
          <div style={{flex:1,background:s.soft,borderRadius:14,padding:'11px 13px',boxShadow:'0 1px 2px rgba(22,23,42,0.05)'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:s.ink}}>Now</div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:13,color:s.ink,marginTop:4,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:s.dot}}/>{s.label}

        {/* Why */}
        <div style={{marginTop:14,background:'#FFF1EA',borderRadius:18,padding:'14px 15px'}}>
          <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'#ED5A2A',marginBottom:8}}>
            <SparkleIco size={14} color="#ED5A2A"/>
            {isAnc?'Why it\'s an anchor':'Why it fits you'}
          </div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#7a4a30',lineHeight:1.5}}>{d.reason||d.note}</div>
        </div>

        {/* What locals say */}
        {d.digest&&(
          <div style={{marginTop:12,background:'#F4F5FA',borderRadius:18,padding:'14px 15px'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'#6C5CE7',marginBottom:8}}>What locals say</div>

        {/* Map mini */}

          <AnchorMap pins={detailPins} connect={false} height="128px"/>
        </div>

        {/* Notes */}
        <div style={{marginTop:16}}>

            style={{width:'100%',border:'1.5px solid #E3E5F0',background:'#fff',borderRadius:14,padding:'12px 14px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#353756',outline:'none',resize:'none',lineHeight:1.5,minHeight:78}}/>
        </div>

        {/* Nearby */}
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:15,color:'#16172A',margin:'18px 0 10px'}}>Fits nearby</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:100}}>
          {pairs.map(p=>(
            <div key={p.id} onClick={()=>push({type:'place',id:p.id})} style={{display:'flex',alignItems:'center',gap:12,background:'#fff',borderRadius:16,padding:'10px 12px',boxShadow:'0 1px 2px rgba(22,23,42,0.05)',cursor:'pointer'}}>
              <div style={{width:46,height:46,borderRadius:12,flexShrink:0,background:p.catGrad}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:600,fontSize:15,color:'#16172A',lineHeight:1.1}}>{p.name}</div>
                <div style={{display:'flex',alignItems:'center',gap:7,marginTop:4,flexWrap:'wrap'}}>
                  <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD'}}>{p.catLabel} · {p.area}</span>

      </div>

      <div style={{position:'sticky',bottom:0,display:'flex',gap:10,padding:'12px 18px 28px',background:'linear-gradient(180deg,rgba(250,250,253,0) 0%,#FAFAFD 28%)'}}>
        <button onClick={()=>onAnchorPlace&&onAnchorPlace(id)} style={{flex:1,border:isAnc?'1.5px solid #E4DEFF':'none',background:isAnc?'#F1EEFF':'#6C5CE7',color:isAnc?'#5A48D6':'#fff',fontWeight:600,fontSize:15,padding:14,borderRadius:15,cursor:'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,boxShadow:isAnc?'none':'0 6px 18px rgba(108,92,231,0.30)'}}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          {isAnc?'Anchored ✓':'Anchor it'}

          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M9 18h6M21 3l-9 9M21 3v6h-6M3 12a9 9 0 0 0 9 9"/>

/* ── BOTTOM NAV ── */
function TabIco({id,on}) {
  const c=on?'#6C5CE7':'#9092AD';
  if(id==='today') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>;
  if(id==='discover') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2.6 4-4 2.6 2.6-4z"/></svg>;
  if(id==='near') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>;
  if(id==='anchors') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="2.4"/><path d="M12 7.4V21M6 13H4a8 8 0 0 0 16 0h-2M8.5 18.5 12 21l3.5-2.5"/></svg>;
  if(id==='search') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
  return null;
}

const NAV=[{id:'today',label:'Today'},{id:'discover',label:'Discover'},{id:'near',label:'Near'},{id:'anchors',label:'Anchors'},{id:'search',label:'Search'}];

function BottomNav({tab,setTab}) {
  return (
    <div style={{flexShrink:0,display:'flex',padding:'8px 2px 20px',background:'rgba(255,255,255,0.86)',backdropFilter:'blur(18px)',borderTop:'1px solid #ECEDF6',zIndex:20}}>
      {NAV.map(t=>{
        const on=tab===t.id;
        return (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'6px 0',border:'none',background:'transparent',cursor:'pointer',color:on?'#6C5CE7':'#9092AD'}}>
            <TabIco id={t.id} on={on}/>
            <span style={{fontSize:10,fontWeight:600,fontFamily:"'Hanken Grotesk',sans-serif"}}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ── APP ── */
function App(){
  const [trip,setTrip]=useState(()=>loadState());
  const [editingTrip,setEditingTrip]=useState(false);
  const [tab,setTab]=useState('today');
  const [layout,setLayout]=useState('A');
  const [filter,setFilter]=useState('all');
  const [added,setAdded]=useState({});
  const [stack,setStack]=useState([]);

  const push=s=>setStack(p=>[...p,s]);
  const pop=()=>setStack(p=>p.slice(0,-1));
  const top=stack[stack.length-1];
  const changeTab=t=>{setTab(t);setStack([]);};

  const handleTripComplete=t=>{saveState(t);setTrip(t);setEditingTrip(false);};
  const handleAnchorPlace=id=>{
    const ap=trip?.anchoredPlaces||[];
    const newAp=ap.includes(id)?ap.filter(x=>x!==id):[...ap,id];
    const newTrip={...trip,anchoredPlaces:newAp};
    saveState(newTrip);setTrip(newTrip);
  };

  if(!trip||editingTrip) return(
    <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#FAFAFD',WebkitFontSmoothing:'antialiased'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <OnboardingFlow onComplete={handleTripComplete} initialData={editingTrip?trip:null}/>
      </div>
    </div>
  );

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#FAFAFD',WebkitFontSmoothing:'antialiased'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {tab==='today'    &&<TodayScreen layout={layout} setLayout={setLayout} push={push} added={added} setAdded={setAdded} trip={trip} onEditTrip={()=>setEditingTrip(true)} goTab={changeTab}/>}
        {tab==='discover' &&<DiscoverScreen push={push}/>}
        {tab==='near'     &&<NearScreen push={push} filter={filter} setFilter={setFilter}/>}
        {tab==='anchors'  &&<AnchorsScreen push={push} trip={trip}/>}
        {tab==='search'   &&<SearchScreen push={push}/>}

        {top&&top.type==='place'  &&<PlaceDetailOverlay key={top.id} id={top.id} pop={pop} push={push} trip={trip} onAnchorPlace={handleAnchorPlace}/>}
        {top&&top.type==='anchor' &&<AnchorDetailOverlay key={top.anchorId} anchorId={top.anchorId} pop={pop} push={push} trip={trip}/>}
        {top&&top.type==='trip'   &&<TripOverlay pop={pop} push={push} trip={trip}/>}
      </div>
      {stack.length===0&&<BottomNav tab={tab} setTab={changeTab}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
