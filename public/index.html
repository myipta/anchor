// PWA: register the service worker (offline shell), request durable storage so
// iOS can't evict the user's trip, and nudge iOS Safari users to install.
(function(){
  if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    });
  }
  if(navigator.storage&&navigator.storage.persist){ navigator.storage.persist().catch(function(){}); }

  // One-time "Add to Home Screen" tip — only on iOS Safari, only in a browser tab.
  try{
    var standalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    var isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
    if(isIOS && !standalone && !localStorage.getItem('a2hs_dismissed')){
      window.addEventListener('load',function(){
        var bar=document.createElement('div');
        bar.style.cssText='position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:9999;background:#16172A;color:#fff;border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(22,23,42,0.35);font-family:\'Hanken Grotesk\',sans-serif;font-size:13.5px;line-height:1.4';
        bar.innerHTML='<span style="font-size:20px">⚓</span><span style="flex:1">Install Anchor: tap <b>Share</b> then <b>Add to Home Screen</b> — full-screen, offline, and your data stays put.</span>';
        var x=document.createElement('button');
        x.textContent='✕'; x.setAttribute('aria-label','Dismiss');
        x.style.cssText='flex-shrink:0;border:none;background:rgba(255,255,255,0.14);color:#fff;border-radius:9px;width:28px;height:28px;font-size:13px;cursor:pointer';
        x.onclick=function(){ localStorage.setItem('a2hs_dismissed','1'); bar.remove(); };
        bar.appendChild(x); document.body.appendChild(bar);
      });
    }
  }catch(e){}
})();

function prefForPlace(place,prefs){
  for(const p of (prefs||[])){
    if((PREF_TO_CATS[p]||[]).includes(place.cat)){
      const opt=PREF_OPTS.find(o=>o.id===p);
      return opt?{id:p,label:opt.label,emoji:opt.emoji}:{id:p,label:p,emoji:''};
    }
  }
  return null;
}
function getSuggestions(prefs,count=2,exclude=[],strict=false){
  const cats=[...new Set(prefs.flatMap(p=>PREF_TO_CATS[p]||[]))];
  const pool=Object.keys(PLACES).filter(id=>!exclude.includes(id));
  const matches=cats.length>0?pool.filter(id=>cats.includes(PLACES[id].cat)):pool;
  const use=strict?matches:(matches.length>=count?matches:[...matches,...pool.filter(id=>!matches.includes(id))]);
  return use.slice(0,count).map(id=>({...bp(id),_matchPref:prefForPlace(PLACES[id],prefs)}));
}

/* ── ITINERARY ── */
function tripDays(trip){
  const n=trip.nights||0;
  return Array.from({length:n},(_,i)=>({index:i,date:trip.arrivalDate?addDays(trip.arrivalDate,i):''}));
}
function dayStopsRefs(trip,dayIndex){
  const it=trip.itinerary||{};
  return Array.isArray(it[dayIndex])?it[dayIndex]:[];
}
function scratchById(trip,id){ return (trip.scratchpad||[]).find(s=>s.id===id); }
function resolveStop(trip,ref){

    const p=bp(ref.id);
    return {kind:'curated',id:ref.id,time:ref.time,name:p.name,area:p.area,catGrad:p.catGrad,catLabel:p.catLabel,
      rating:p.rating,tabelogRating:p.tabelogRating,budget:p.budget,openNow:p.openNow,hours:p.hours,coords:p.coords,
      category:p.catLabel,note:p.note||p.reason,station:p.station};
  }
  const s=scratchById(trip,ref.id);
  if(s) return {kind:'scratch',id:ref.id,time:ref.time,name:s.name,area:s.area,
    catGrad:'linear-gradient(135deg,#5BD6B0,#8B72FB)',catLabel:s.category||'Place',
    rating:s.rating,tabelogRating:null,budget:s.budget,openNow:s.openNow,hours:s.hours,coords:s.coords,
    category:s.category,note:s.note,googleUrl:s.googleUrl};
  return null;
}
function isScheduled(trip,kind,id){
  const it=trip.itinerary||{};
  return Object.values(it).some(arr=>Array.isArray(arr)&&arr.some(r=>r.kind===kind&&r.id===id));
}
function unscheduledPool(trip){
  const pool=[];
  (trip.anchoredPlaces||[]).forEach(id=>{ if(!isScheduled(trip,'curated',id)) pool.push({kind:'curated',id}); });
  (trip.scratchpad||[]).forEach(s=>{ if(!isScheduled(trip,'scratch',s.id)) pool.push({kind:'scratch',id:s.id}); });
  return pool;
}
// Everything the traveler has anchored: curated places + scratchpad items marked anchored.
function anchoredRefs(trip){
  const refs=(trip.anchoredPlaces||[]).map(id=>({kind:'curated',id}));
  (trip.scratchpad||[]).forEach(s=>{ if(s.status==='anchored') refs.push({kind:'scratch',id:s.id}); });
  return refs;
}

function bp(id) {
  const p=PLACES[id], c=CATS[p.cat]||CATS.nbhd;
  return {id,catLabel:c.label,catGrad:c.grad,...p};
}

// Category emoji — the final fallback when a place has no photo. Matches the
// onboarding "what do you like" icons. Checks specific cuisines before generic.
function placeEmoji(p){
  if(!p) return '📍';
  const t=((p.category||'')+' '+(p.catLabel||'')+' '+(p.cat||'')+' '+(p.name||'')).toLowerCase();
  const has=(...ks)=>ks.some(k=>t.includes(k));
  if(has('ramen','noodle','soba','udon')) return '🍜';
  if(has('sushi','sashimi')) return '🍣';
  if(has('coffee','cafe','café','espresso','roaster')) return '☕';
  if(has('izakaya','sake','bar','pub','cocktail','beer','wine','nightlife','yokocho')) return '🍶';
  if(has('bakery','bread','pastry','croissant')) return '🥐';
  if(has('dessert','sweets','ice cream','patisserie','cake','wagashi')) return '🍰';
  if(has('hotel','lodging','ryokan','inn','hostel','stay')) return '🏨';
  if(has('temple','shrine','culture')) return '⛩';
  if(has('museum','gallery','art')) return '🎨';
  if(has('park','garden','nature','forest','river')) return '🌳';
  if(has('view','observ','tower','sky','deck')) return '🗼';
  if(has('restaurant','dining','grill','yakitori','yakiton','tonkatsu','katsu','tempura','curry','gyoza','food','eatery','teishoku','tofu','market')) return '🍽';
  if(has('vintage','thrift','boutique','shop','store','mall')) return '🛍';
  return '📍';
}

/* ── PLACE PHOTOS ── Wikipedia first, Google fallback; cached in-memory + localStorage. */
const _photoMem={};
function usePlacePhoto(name,area){
  const key=(name||'')+'|'+(area||'');
  const [url,setUrl]=useState(()=> key in _photoMem ? _photoMem[key] : undefined);
  useEffect(()=>{
    if(!name){return;}
    if(key in _photoMem){ setUrl(_photoMem[key]); return; }
    let ls={}; try{ls=JSON.parse(localStorage.getItem('photo_v1')||'{}');}catch{}
    if(key in ls){ _photoMem[key]=ls[key]; setUrl(ls[key]); return; }
    let dead=false;
    API.photo(name,area).then(u=>{
      if(dead) return;
      _photoMem[key]=u||null; setUrl(u||null);
      try{const cur=JSON.parse(localStorage.getItem('photo_v1')||'{}'); cur[key]=u||null; localStorage.setItem('photo_v1',JSON.stringify(cur));}catch{}
    });
    return ()=>{dead=true;};
  },[key]); // eslint-disable-line
  return url; // undefined while loading, string when found, null when none
}

// Coloured gradient tile that swaps in a real photo once loaded. Pass-through children render on top.
function Photo({name,area,grad,style,scrim,emoji,emojiSize=26,placeholder,onClick,children}){
  const url=usePlacePhoto(name,area);
  const [ok,setOk]=useState(true);
  const show=url&&ok;
  return(
    <div onClick={onClick} style={{position:'relative',overflow:'hidden',background:grad,...style}}>
      {show&&<img src={url} alt="" loading="lazy" onError={()=>setOk(false)}
        style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:0,animation:'photoIn .4s ease forwards'}}/>}
      {show&&scrim&&<div style={{position:'absolute',inset:0,background:scrim,pointerEvents:'none'}}/>}
      {!show&&placeholder}
      {children}
    </div>
  );
}

function sc(openNow) {
  if(openNow==='open')  return {dot:'#14A06E',ink:'#0E865B',soft:'#D6F5E6',label:'Open now'};
  if(openNow==='soon')  return {dot:'#ECA800',ink:'#C98A00',soft:'#FCEFCF',label:'Closing soon'};
  return                       {dot:'#9092AD',ink:'#6C6E8E',soft:'#ECEDF6',label:'Closed'};
}

// A minimal valid trip so new users land straight in the concierge (no setup
// form). The concierge fills in hotel/dates/interests through conversation.
function blankTrip(){return {destination:'Tokyo',arrivalDate:'',nights:0,anchors:[],prefs:[],anchoredPlaces:[],taste:{likes:[],dislikes:[]},createdAt:Date.now()};}
// "Not set up yet" = no hotel anchor and no arrival date.
function tripNeedsSetup(t){return !t||(!((t.anchors||[]).length)&&!t.arrivalDate);}

function DraftPill({children}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.14)',color:'#fff',borderRadius:999,padding:'6px 11px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>{children}</span>;
}

function ChatOnboarding({onComplete,onSkip}){
  const [messages,setMessages]=useState([{role:'assistant',content:"Hey — I'm Anchor. 🗼 Let's shape your Tokyo trip. Tap “📅 Set travel dates” up top to pick your dates, then tell me about the trip."}]);
  const [draft,setDraft]=useState({});
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [chips,setChips]=useState([]);
  const [ready,setReady]=useState(false);
  const [error,setError]=useState(null);
  const [showDates,setShowDates]=useState(false);
  const [dArr,setDArr]=useState('');
  const [dNights,setDNights]=useState(4);
  const scrollRef=React.useRef(null);
  useEffect(()=>{const el=scrollRef.current;if(el)el.scrollTop=el.scrollHeight;},[messages,loading,error,showDates]);

  const hasDraft=draft.arrivalDate||draft.hotelName||(draft.prefs&&draft.prefs.length);

  const openDates=()=>{ setDArr(draft.arrivalDate||''); setDNights(draft.nights||4); setShowDates(true); };
  const saveDates=()=>{
    if(!dArr) return;
    const merged={...draft,arrivalDate:dArr,nights:dNights};
    setDraft(merged); setShowDates(false); setReady(true); setChips([]);
    setMessages(m=>[...m,{role:'assistant',content:`Locked in 📅 ${fmtDate(dArr)}–${fmtDate(addDays(dArr,dNights))} · ${dNights} ${dNights===1?'night':'nights'}. Where are you staying, or what kind of trip are you after?`}]);
  };

  const send=async(text)=>{
    const t=(text!=null?text:input).trim();
    if(!t||loading) return;
    setInput(''); setChips([]); setError(null);
    const next=[...messages,{role:'user',content:t}];
    setMessages(next); setLoading(true);
    try{
      const r=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({messages:next.map(m=>({role:m.role,content:m.content})),trip:draft})});
      const d=await r.json();
      if(!r.ok){setLoading(false);setError(d.message||'Anchor had trouble responding.');return;}
      const merged={...draft},u=d.updates||{};
      if(u.arrivalDate) merged.arrivalDate=u.arrivalDate;
      if(u.nights) merged.nights=u.nights;
      if(u.hotelName) merged.hotelName=u.hotelName;
      if(u.hotelArea) merged.hotelArea=u.hotelArea;
      if(u.prefs&&u.prefs.length) merged.prefs=[...new Set([...(draft.prefs||[]),...u.prefs])];
      setDraft(merged);
      setMessages(m=>[...m,{role:'assistant',content:d.reply}]);
      setChips(d.chips||[]);
      setReady(Boolean(d.ready)&&!!merged.arrivalDate);
      setLoading(false);
    }catch(e){setLoading(false);setError('Could not reach Anchor. Check your connection.');}
  };

  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',background:'#FAFAFD'}}>
      <div style={{flexShrink:0,background:'linear-gradient(160deg,#1A1040,#2D1B69)',padding:'16px 18px 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <AnchorIco size={20} color="#FB7242"/>
            <span style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:20,color:'#fff'}}>Plan with Anchor</span>
          </div>
          <button onClick={onSkip} style={{border:'none',background:'rgba(255,255,255,0.12)',color:'rgba(255,255,255,0.85)',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:12.5,padding:'6px 12px',borderRadius:999,cursor:'pointer'}}>Skip</button>
        </div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:12,alignItems:'center'}}>
          {draft.arrivalDate
            ? <button onClick={openDates} style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.14)',color:'#fff',border:'none',borderRadius:999,padding:'6px 11px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:600,cursor:'pointer'}}>📅 {fmtDate(draft.arrivalDate)} · {draft.nights||'?'} nights ✎</button>
            : <button onClick={openDates} style={{display:'inline-flex',alignItems:'center',gap:7,background:'#fff',color:'#2D1B69',border:'none',borderRadius:999,padding:'8px 14px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,fontWeight:700,cursor:'pointer'}}>📅 Set travel dates</button>}
          {draft.hotelName&&<DraftPill>🏨 {draft.hotelName}{draft.hotelArea?' · '+draft.hotelArea:''}</DraftPill>}
          {draft.prefs&&draft.prefs.length>0&&<DraftPill>{draft.prefs.slice(0,5).map(id=>((PREF_OPTS.find(p=>p.id===id)||{}).emoji)||'•').join(' ')} {draft.prefs.length} vibes</DraftPill>}
        </div>
      </div>

      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'18px 16px',display:'flex',flexDirection:'column',gap:12}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{maxWidth:'82%',padding:'11px 14px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',
              background:m.role==='user'?'#6C5CE7':'#fff',color:m.role==='user'?'#fff':'#16172A',
              fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,lineHeight:1.45,
              boxShadow:m.role==='user'?'0 4px 12px rgba(108,92,231,0.28)':'0 1px 2px rgba(22,23,42,0.06),0 5px 14px rgba(22,23,42,0.06)'}}>{m.content}</div>
          </div>
        ))}
        {loading&&(
          <div style={{display:'flex',justifyContent:'flex-start'}}>
            <div style={{padding:'13px 16px',borderRadius:'18px 18px 18px 4px',background:'#fff',boxShadow:'0 1px 2px rgba(22,23,42,0.06)',display:'flex',gap:5}}>
              {[0,1,2].map(n=><span key={n} style={{width:7,height:7,borderRadius:'50%',background:'#C0C2D4',animation:`anchorBlink 1s ${n*0.18}s infinite`}}/>)}
            </div>
          </div>
        )}
        {error&&(
          <div style={{background:'#FFF1EA',borderRadius:14,padding:'12px 14px',textAlign:'center'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,color:'#8a4a2c',lineHeight:1.45}}>{error}</div>
            <button onClick={onSkip} style={{marginTop:8,border:'none',background:'#FB7242',color:'#fff',fontWeight:600,fontSize:13.5,padding:'8px 16px',borderRadius:10,cursor:'pointer'}}>Set up manually →</button>
          </div>
        )}
      </div>

      <div style={{flexShrink:0,padding:'10px 14px 22px',background:'#FAFAFD',borderTop:'1px solid #ECEDF6'}}>
        {showDates&&(
          <div style={{background:'#fff',border:'1.5px solid #E3E5F0',borderRadius:16,padding:'14px',marginBottom:10,boxShadow:'0 -2px 12px rgba(22,23,42,0.06)'}}>
            <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:15,color:'#16172A',marginBottom:11}}>Travel dates</div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:7,letterSpacing:'0.06em',textTransform:'uppercase'}}>Arriving</div>
            <input type="date" value={dArr} min={todayStr()} onChange={e=>setDArr(e.target.value)}
              style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:12,padding:'12px 14px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:16,color:'#16172A',background:'#fff',outline:'none'}}/>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',margin:'12px 0 7px',letterSpacing:'0.06em',textTransform:'uppercase'}}>Nights</div>
            <div style={{display:'flex',alignItems:'center',gap:14,border:'1.5px solid #E3E5F0',borderRadius:12,padding:'8px 14px'}}>
              <button onClick={()=>setDNights(n=>Math.max(1,n-1))} style={{width:34,height:34,borderRadius:'50%',border:'1.5px solid #E3E5F0',background:'#fff',fontSize:20,cursor:'pointer',color:'#6C5CE7',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
              <div style={{flex:1,textAlign:'center'}}><span style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:26,color:'#16172A'}}>{dNights}</span><span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#9092AD',marginLeft:7}}>nights</span></div>
              <button onClick={()=>setDNights(n=>Math.min(30,n+1))} style={{width:34,height:34,borderRadius:'50%',border:'1.5px solid #E3E5F0',background:'#fff',fontSize:20,cursor:'pointer',color:'#6C5CE7',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
            </div>
            {dArr&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#5A48D6',marginTop:10,fontWeight:600}}>{fmtDateLong(dArr)} → {fmtDateLong(addDays(dArr,dNights))}</div>}
            <div style={{display:'flex',gap:9,marginTop:12}}>
              <button onClick={()=>setShowDates(false)} style={{border:'1.5px solid #E3E5F0',background:'#fff',color:'#6C6E8E',fontWeight:600,fontSize:14.5,padding:'11px 16px',borderRadius:12,cursor:'pointer'}}>Cancel</button>
              <button onClick={saveDates} disabled={!dArr} style={{flex:1,border:'none',borderRadius:12,background:dArr?'#6C5CE7':'#E3E5F0',color:'#fff',fontWeight:700,fontSize:14.5,padding:'11px',cursor:dArr?'pointer':'default'}}>Set dates</button>
            </div>
          </div>
        )}
        {ready&&!showDates&&(
          <button onClick={()=>onComplete(draft)} style={{width:'100%',marginBottom:10,border:'none',borderRadius:14,background:'linear-gradient(135deg,#6C5CE7,#FB7242)',color:'#fff',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:16,padding:'13px',cursor:'pointer',boxShadow:'0 6px 18px rgba(108,92,231,0.32)'}}>Review &amp; finish setup →</button>
        )}
        {chips.length>0&&!loading&&(
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
            {chips.map((c,i)=>(
              <button key={i} onClick={()=>send(c)} style={{border:'1.5px solid #E3E5F0',background:'#fff',color:'#4E5072',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:13.5,padding:'8px 13px',borderRadius:999,cursor:'pointer'}}>{c}</button>
            ))}
          </div>
        )}
        <div style={{display:'flex',gap:9,alignItems:'center'}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();send();}}}
            placeholder="Message Anchor…"
            style={{flex:1,border:'1.5px solid #E3E5F0',background:'#fff',borderRadius:14,padding:'13px 15px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#16172A',outline:'none'}}/>
          <button onClick={()=>send()} disabled={!input.trim()||loading} style={{width:48,height:48,flexShrink:0,borderRadius:14,border:'none',background:input.trim()&&!loading?'#6C5CE7':'#E3E5F0',cursor:input.trim()&&!loading?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── ONBOARDING ── */
function OBProgress({cur}){
  return(
    <div style={{display:'flex',gap:7,justifyContent:'center',padding:'6px 0'}}>
      {[1,2,3].map(n=>(
        <div key={n} style={{height:6,borderRadius:999,transition:'all .25s',
          background:n===cur?'#6C5CE7':n<cur?'#A793FF':'#E3E5F0',
          width:n===cur?22:6}}/>
      ))}
    </div>
  );
}

function OBBack({onClick}){
  return(
    <button onClick={onClick} style={{width:48,height:48,borderRadius:14,border:'1.5px solid #E3E5F0',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
  );
}

function OnboardingFlow({onComplete,initialData}){
  const [step,setStep]=useState(initialData?1:0);
  const [arrive,setArrive]=useState(initialData?.arrivalDate||'');
  const [nights,setNights]=useState(initialData?.nights||4);
  const [hotelName,setHotelName]=useState(initialData?.anchors?.[0]?.name||'');
  const [hotelArea,setHotelArea]=useState(initialData?.anchors?.[0]?.area||'');
  const [hotelPlace,setHotelPlace]=useState(initialData?.anchors?.[0]?.address?initialData.anchors[0]:null);
  const [hotelResults,setHotelResults]=useState([]);
  const [hotelFinding,setHotelFinding]=useState(false);
  const [prefs,setPrefs]=useState(initialData?.prefs||[]);
  const depart=arrive?addDays(arrive,nights):'';

  // Live Google lookup for the hotel so the anchor gets a real address + coords.
  useEffect(()=>{
    if(step!==2||hotelPlace) return;
    const term=hotelName.trim();
    if(term.length<3){ setHotelResults([]); setHotelFinding(false); return; }
    let dead=false; setHotelFinding(true);
    const t=setTimeout(()=>{
      API.places(term,hotelArea||'',5).then(res=>{ if(dead) return; setHotelFinding(false); setHotelResults(res.places||[]); });
    },450);
    return ()=>{dead=true;clearTimeout(t);};
  },[hotelName,hotelArea,step,hotelPlace]); // eslint-disable-line

  const finish=()=>{
    const hp=hotelPlace;
    const anchors=(hp||hotelName.trim())?[{
      id:'anc-0',name:hp?hp.name:hotelName.trim(),area:(hp&&hp.area&&hp.area!=='Tokyo'?hp.area:hotelArea)||'Tokyo',
      checkin:arrive||todayStr(),checkout:depart||addDays(arrive||todayStr(),nights),
      ...(hp?{address:hp.address,coords:hp.coords,googleUrl:hp.googleUrl,rating:hp.rating,reviews:hp.reviews,hours:hp.hours,category:hp.category}:{})
    }]:[];
    onComplete({destination:'Tokyo',arrivalDate:arrive||todayStr(),departureDate:depart||addDays(arrive||todayStr(),nights),nights,anchors,prefs,anchoredPlaces:initialData?.anchoredPlaces||[]});
  };

  if(step===0) return(
    <div style={{position:'absolute',inset:0,background:'linear-gradient(160deg,#1A1040 0%,#2D1B69 55%,#16172A 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',textAlign:'center'}}>
      <div style={{marginBottom:20}}><AnchorIco size={52} color="#FB7242"/></div>
      <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:56,color:'#fff',letterSpacing:'-0.03em',lineHeight:1}}>Anchor</div>
      <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:18,color:'rgba(255,255,255,0.6)',marginTop:10,marginBottom:48}}>Your Tokyo companion</div>
      <div style={{width:'100%',background:'rgba(255,255,255,0.08)',borderRadius:20,padding:'18px 20px',marginBottom:24,textAlign:'left'}}>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.4)',letterSpacing:'0.10em',textTransform:'uppercase',marginBottom:14}}>Set up in 3 steps</div>
        {[['✈','Your arrival & trip length'],['🏨','Your hotel (your anchor)'],['🍜','Your travel style']].map(([e,t])=>(
          <div key={t} style={{display:'flex',alignItems:'center',gap:13,marginBottom:11}}>
            <span style={{fontSize:20,width:30,textAlign:'center'}}>{e}</span>
            <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'rgba(255,255,255,0.8)'}}>{t}</span>
          </div>
        ))}
      </div>
      <button onClick={()=>setStep(1)} style={{width:'100%',background:'#FB7242',color:'#fff',border:'none',borderRadius:18,padding:'18px 24px',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:20,cursor:'pointer',boxShadow:'0 8px 32px rgba(251,114,66,0.50)'}}>
        Plan your trip →
      </button>
    </div>
  );

  if(step===1) return(
    <div style={{position:'absolute',inset:0,background:'#FAFAFD',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'24px 22px 0'}}>
        <OBProgress cur={1}/>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:32,color:'#16172A',marginTop:18,letterSpacing:'-0.02em',lineHeight:1.1}}>When are you<br/>going to Tokyo?</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'28px 22px',display:'flex',flexDirection:'column',gap:22}}>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>Arriving</div>
          <input type="date" value={arrive} min={todayStr()} onChange={e=>setArrive(e.target.value)}
            style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:16,padding:'15px 16px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:17,color:'#16172A',background:'#fff',outline:'none'}}/>
        </div>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>How many nights?</div>
          <div style={{display:'flex',alignItems:'center',gap:16,background:'#fff',border:'1.5px solid #E3E5F0',borderRadius:16,padding:'10px 16px'}}>
            <button onClick={()=>setNights(n=>Math.max(1,n-1))} style={{width:40,height:40,borderRadius:'50%',border:'1.5px solid #E3E5F0',background:'#fff',fontSize:24,cursor:'pointer',color:'#6C5CE7',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
            <div style={{flex:1,textAlign:'center'}}>
              <span style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:34,color:'#16172A'}}>{nights}</span>
              <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:16,color:'#9092AD',marginLeft:8}}>nights</span>
            </div>
            <button onClick={()=>setNights(n=>Math.min(30,n+1))} style={{width:40,height:40,borderRadius:'50%',border:'1.5px solid #E3E5F0',background:'#fff',fontSize:24,cursor:'pointer',color:'#6C5CE7',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
          </div>
        </div>
        {arrive&&(
          <div style={{background:'#F1EEFF',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:10}}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
            <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,fontWeight:600,color:'#5A48D6'}}>{fmtDateLong(arrive)} → {fmtDateLong(depart)} · {nights} {nights===1?'night':'nights'}</span>
          </div>
        )}
      </div>
      <div style={{padding:'0 22px 40px',display:'flex',gap:12}}>
        <OBBack onClick={()=>setStep(0)}/>
        <button disabled={!arrive} onClick={()=>setStep(2)} style={{flex:1,height:52,border:'none',borderRadius:16,background:arrive?'#6C5CE7':'#E3E5F0',color:arrive?'#fff':'#9092AD',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,cursor:arrive?'pointer':'default',transition:'background .15s'}}>
          Next →
        </button>
      </div>
    </div>
  );

  if(step===2) return(
    <div style={{position:'absolute',inset:0,background:'#FAFAFD',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'24px 22px 0'}}>
        <OBProgress cur={2}/>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:32,color:'#16172A',marginTop:18,letterSpacing:'-0.02em',lineHeight:1.1}}>Where are you<br/>staying?</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',marginTop:7}}>Add your hotel — it becomes your anchor.</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'24px 22px',display:'flex',flexDirection:'column',gap:20}}>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>Hotel / Airbnb</div>
          {hotelPlace?(
            <div style={{display:'flex',gap:12,alignItems:'flex-start',background:'#fff',border:'1.5px solid #6C5CE7',borderRadius:16,padding:'13px 14px'}}>
              <div style={{width:42,height:42,borderRadius:11,flexShrink:0,background:'linear-gradient(135deg,#9AA0FF,#6C5CE7)',display:'flex',alignItems:'center',justifyContent:'center'}}><AnchorIco size={18} color="#fff"/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:16,color:'#16172A',lineHeight:1.15}}>{hotelPlace.name}</div>
                {hotelPlace.address&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12.5,color:'#9092AD',marginTop:3,lineHeight:1.4}}>{hotelPlace.address}</div>}
                {hotelPlace.rating!=null&&<div style={{display:'inline-flex',alignItems:'center',gap:4,marginTop:5}}><StarIco size={13}/><span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:'#353756'}}>{hotelPlace.rating}</span>{hotelPlace.reviews!=null&&<span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD'}}>({hotelPlace.reviews})</span>}</div>}
              </div>
              <button onClick={()=>{setHotelPlace(null);setHotelResults([]);}} style={{flexShrink:0,border:'none',background:'none',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:600,color:'#6C5CE7',cursor:'pointer'}}>Change</button>
            </div>
          ):(<>
            <div style={{position:'relative'}}>
              <svg style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9092AD" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" value={hotelName} onChange={e=>setHotelName(e.target.value)} placeholder="Search your hotel…"
                style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:16,padding:'15px 16px 15px 42px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:17,color:'#16172A',background:'#fff',outline:'none'}}/>
            </div>
            {hotelFinding&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginTop:8,paddingLeft:4}}>Searching Tokyo…</div>}
            {!hotelFinding&&hotelResults.length>0&&(
              <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
                {hotelResults.map((r,i)=>(
                  <button key={(r.googleUrl||r.name)+i} onClick={()=>{setHotelPlace(r);setHotelName(r.name);if(!hotelArea&&r.area&&r.area!=='Tokyo')setHotelArea(r.area);setHotelResults([]);}}
                    style={{textAlign:'left',border:'1px solid #E3E5F0',background:'#fff',borderRadius:14,padding:'11px 13px',cursor:'pointer',display:'flex',gap:10,alignItems:'flex-start'}}>
                    <div style={{width:34,height:34,borderRadius:9,flexShrink:0,marginTop:1,background:'linear-gradient(135deg,#5BD6B0,#8B72FB)',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22Z"/><circle cx="12" cy="10" r="3"/></svg></div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,fontSize:14.5,color:'#16172A',lineHeight:1.2}}>{r.name}</div>
                      {r.address&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD',marginTop:2,lineHeight:1.35}}>{r.address}</div>}
                    </div>
                  </button>
                ))}
              </div>
            )}
            {!hotelFinding&&hotelName.trim().length>=3&&hotelResults.length===0&&(
              <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12.5,color:'#9092AD',marginTop:8,paddingLeft:4,lineHeight:1.4}}>No match found — you can still continue with this name.</div>
            )}
          </>)}
        </div>
        <div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',marginBottom:9,letterSpacing:'0.08em',textTransform:'uppercase'}}>Neighborhood</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {TOKYO_AREAS.map(a=>(
              <button key={a} onClick={()=>setHotelArea(a===hotelArea?'':a)}
                style={{padding:'9px 16px',borderRadius:999,border:'none',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:14,cursor:'pointer',transition:'all .15s',
                  background:a===hotelArea?'#6C5CE7':'#fff',color:a===hotelArea?'#fff':'#4E5072',
                  boxShadow:a===hotelArea?'0 3px 10px rgba(108,92,231,0.35)':'0 1px 2px rgba(22,23,42,0.06)',
                  outline:'1.5px solid '+(a===hotelArea?'transparent':'#E3E5F0')}}>
                {a}
              </button>
            ))}
          </div>
        </div>
        {arrive&&(
          <div style={{background:'#FFF6F1',borderRadius:14,padding:'13px 16px',display:'flex',alignItems:'center',gap:10}}>
            <AnchorIco size={16} color="#FB7242"/>
            <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,fontWeight:600,color:'#ED5A2A'}}>{fmtDate(arrive)} – {fmtDate(depart)} · {nights} nights</span>
          </div>
        )}
        <button onClick={()=>setStep(3)} style={{border:'none',background:'none',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#9092AD',cursor:'pointer',textDecoration:'underline',textAlign:'center',padding:'4px 0'}}>Skip for now</button>
      </div>
      <div style={{padding:'0 22px 40px',display:'flex',gap:12}}>
        <OBBack onClick={()=>setStep(1)}/>
        <button onClick={()=>setStep(3)} style={{flex:1,height:52,border:'none',borderRadius:16,background:'#6C5CE7',color:'#fff',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,cursor:'pointer'}}>
          Next →
        </button>
      </div>
    </div>
  );

  if(step===3) return(
    <div style={{position:'absolute',inset:0,background:'#FAFAFD',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'24px 22px 0',flexShrink:0}}>
        <OBProgress cur={3}/>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:32,color:'#16172A',marginTop:18,letterSpacing:'-0.02em',lineHeight:1.1}}>What do you<br/>love?</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',marginTop:7,marginBottom:4}}>Pick your Tokyo vibe — we'll shape suggestions around you.</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'18px 22px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,alignContent:'start'}}>
        {PREF_OPTS.map(p=>{
          const on=prefs.includes(p.id);
          const cat=CATS[p.cat]||CATS.food;
          return(
            <button key={p.id} onClick={()=>setPrefs(prev=>on?prev.filter(x=>x!==p.id):[...prev,p.id])}
              style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:7,padding:'15px 14px 13px',borderRadius:18,
                border:`2px solid ${on?'#6C5CE7':'transparent'}`,
                background:on?'#F1EEFF':'#fff',
                boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 5px 14px rgba(22,23,42,0.06)',
                cursor:'pointer',textAlign:'left',position:'relative',transition:'all .15s'}}>
              <div style={{width:38,height:38,borderRadius:11,background:cat.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:21}}>
                {p.emoji}
              </div>
              <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:14,color:on?'#5A48D6':'#353756',lineHeight:1.2}}>{p.label}</span>
              {on&&<div style={{position:'absolute',top:10,right:10}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </div>}
            </button>
          );
        })}
      </div>
      <div style={{padding:'12px 22px 40px',display:'flex',gap:12,flexShrink:0}}>
        <OBBack onClick={()=>setStep(2)}/>
        <button onClick={finish} style={{flex:1,height:52,border:'none',borderRadius:16,background:'linear-gradient(135deg,#6C5CE7,#FB7242)',color:'#fff',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,cursor:'pointer',boxShadow:'0 8px 24px rgba(108,92,231,0.35)'}}>
          Let's go! ✈
        </button>
      </div>
    </div>
  );

  return null;
}

/* ── TODAY ── */
const segBase={border:'none',background:'transparent',fontWeight:600,fontSize:13,color:'#6C6E8E',padding:'6px 14px',borderRadius:999,cursor:'pointer',transition:'all .15s'};
const segOn={...segBase,background:'#fff',color:'#16172A',boxShadow:'0 1px 3px rgba(22,23,42,0.14)'};

function TodayScreen({layout,setLayout,push,added,setAdded,trip,onEditTrip,goTab}){
  const today=todayStr();
  const dayIndex=trip.arrivalDate?daysBetween(trip.arrivalDate,today):0;
  const totalNights=trip.nights||4;
  const isPreTrip=dayIndex<0;
  const isPostTrip=dayIndex>=totalNights;
  const viewDay=Math.max(0,Math.min(totalNights-1,dayIndex));
  const todayAnchor=trip.anchors?.[0]||null;
  const areaLabel=(todayAnchor&&AREA_LABELS[todayAnchor.area])||todayAnchor?.area||'Tokyo';
  const active=!isPreTrip&&!isPostTrip;

  // A planned itinerary for this day takes over from the AI suggestions.
  const planned=active?dayStopsRefs(trip,viewDay).map(r=>resolveStop(trip,r)).filter(Boolean):[];
  const usePlan=planned.length>0;

  // Candidate pool, tuned by learned taste; Claude ranks it and writes reasons.
  const taste=trip.taste||{likes:[],dislikes:[]};
  const likeTags=taste.likes||[], dislikeTags=taste.dislikes||[];
  const tasteKey=JSON.stringify(taste);
  const hayOf=p=>((p.name||'')+' '+(p.catLabel||'')+' '+(p.area||'')+' '+(p.note||p.reason||p.digest||'')).toLowerCase();
  const pool=useMemo(()=>{
    let pl=getSuggestions(trip.prefs||[],8,[]);
    if(dislikeTags.length) pl=pl.filter(p=>{const h=hayOf(p);return !dislikeTags.some(t=>t&&h.includes(t));});
    if(likeTags.length) pl=[...pl].sort((a,b)=>((likeTags.some(t=>hayOf(b).includes(t))?1:0)-(likeTags.some(t=>hayOf(a).includes(t))?1:0)));
    return pl;
  },[JSON.stringify(trip.prefs),tasteKey]); // eslint-disable-line
  const [ai,setAi]=useState(null);        // [{id,reason}] top AI picks, or null
  const [aiLoading,setAiLoading]=useState(false);
  useEffect(()=>{
    if(!active||usePlan){return;}
    let dead=false; setAiLoading(true);
    API.suggest([...(trip.prefs||[]),...likeTags],pool).then(ranked=>{
      if(dead) return;
      setAiLoading(false);
      setAi(ranked?ranked.slice(0,2).map(r=>({id:r.id,reason:r.reason})).filter(x=>PLACES[x.id]):null);
    });
    return ()=>{dead=true;};
  },[active,usePlan,JSON.stringify(trip.prefs),tasteKey]); // eslint-disable-line

  const suggs=(ai&&ai.length)
    ? ai.map(r=>({...bp(r.id),reason:r.reason,aiPick:true}))
    : pool.slice(0,2);

  const hotelStop=todayAnchor?[{id:'hotel-0',name:todayAnchor.name,area:todayAnchor.area,kind:'hotel',num:1,time:'Check-in',catGrad:CATS.stay.grad,rating:null,tabelogRating:null,openNow:'open',budget:null,note:'Your anchor for this leg of the trip.',hasLine:(usePlan?planned.length:suggs.length)>0}]:[];
  const base=todayAnchor?1:0;
  const dayStops=usePlan
    ? [...hotelStop, ...planned.map((p,i)=>({...p,kind:'anchor',num:base+1+i,time:p.time||'—',hasLine:i<planned.length-1,note:p.note||p.hours||'Planned stop'}))]
    : [...hotelStop, ...suggs.map((p,i)=>({...p,kind:'suggest',num:base+1+i,time:['11:00','18:00'][i]||'14:00',hasLine:i<suggs.length-1,added:!!added[p.id],aiLoading}))];
  const PINPOS=[[32,60],[68,30],[50,72],[72,55],[30,38],[55,46]];
  const mapItems=usePlan?planned:suggs;
  const dayPins=[
    ...(todayAnchor?[{id:'hotel-0',x:55,y:40,num:1,kind:'anchor',label:todayAnchor.area}]:[]),
    ...mapItems.map((p,i)=>({id:p.id,x:(PINPOS[i]||[50,50])[0],y:(PINPOS[i]||[50,50])[1],num:base+1+i,kind:usePlan?'anchor':'suggest'})),
    {id:'you',x:46,y:56,kind:'you'},
  ];

  const EditBtn=()=>(
    <button onClick={onEditTrip} style={{width:36,height:36,borderRadius:'50%',border:'1px solid #E3E5F0',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 1px 2px rgba(22,23,42,0.05)',cursor:'pointer'}}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  );

  // Taste-based finds (from Discover's "Optimize my search") surfaced on Today too.
  const tasteFinds=(trip.discovered||[]).filter(p=>!(trip.scratchpad||[]).some(s=>s.sourceId===p.id)&&!(trip.dismissedPlaces||[]).includes(p.id)).slice(0,8);
  const TasteStrip=()=> tasteFinds.length===0?null:(
    <div style={{padding:'10px 0 2px'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'0 20px 8px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:700,color:'#0E865B'}}><SparkleIco size={14} color="#0E865B"/> From your taste</div>
      <div style={{display:'flex',gap:10,overflowX:'auto',padding:'0 18px 4px'}}>
        {tasteFinds.map(p=>(
          <div key={p.id} onClick={()=>p.googleUrl&&window.open(p.googleUrl,'_blank','noopener')} style={{flexShrink:0,width:152,background:'#fff',borderRadius:16,boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 6px 16px rgba(22,23,42,0.06)',cursor:'pointer',overflow:'hidden'}}>
            <Photo name={p.name} area={p.area} grad="linear-gradient(135deg,#5BD6B0,#8B72FB)" scrim="linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,0.30) 100%)" style={{height:84}}/>
            <div style={{padding:'9px 10px 11px'}}>
              <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:13.5,color:'#16172A',lineHeight:1.15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</div>
              <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,color:'#9092AD',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.area}{p._foundFor?' · '+p._foundFor:''}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  // Day-by-day itinerary strip — visible in Today (pre-trip and during).
  const itinDays=Array.from({length:totalNights},(_,i)=>({i,date:trip.arrivalDate?addDays(trip.arrivalDate,i):'',stops:dayStopsRefs(trip,i).length}));
  const ItineraryStrip=()=>(
    <div style={{padding:'4px 0 2px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 18px 9px'}}>
        <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:700,color:'#16172A'}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
          Day-by-day itinerary
        </div>
        <button onClick={()=>push({type:'trip'})} style={{border:'none',background:'none',cursor:'pointer',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:600,color:'#6C5CE7'}}>All days →</button>
      </div>
      <div style={{display:'flex',gap:9,overflowX:'auto',padding:'0 18px 4px'}}>
        {itinDays.map(d=>{
          const isToday=active&&d.i===viewDay;
          return(
            <button key={d.i} onClick={()=>push({type:'day',dayIndex:d.i})} style={{flexShrink:0,width:132,textAlign:'left',border:'1.5px solid '+(isToday?'#6C5CE7':'#E3E5F0'),background:isToday?'#F1EEFF':'#fff',borderRadius:14,padding:'10px 12px',cursor:'pointer',boxShadow:'0 1px 2px rgba(22,23,42,0.05)'}}>
              <div style={{fontFamily:"'Geist Mono',monospace",fontSize:12,fontWeight:600,color:isToday?'#6C5CE7':'#9092AD'}}>Day {d.i+1}{isToday?' · Today':''}</div>
              <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:14,color:'#16172A',marginTop:3,lineHeight:1.1}}>{d.date?fmtDate(d.date):'—'}</div>
              {todayAnchor&&<div style={{display:'flex',alignItems:'center',gap:5,marginTop:5,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:600,color:'#6C5CE7',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}><AnchorIco size={10} color="#6C5CE7"/>{todayAnchor.area}</div>}
              <div style={{display:'flex',alignItems:'center',gap:5,marginTop:5,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11.5,fontWeight:600,color:d.stops>0?'#0E865B':'#9092AD'}}>
                {d.stops>0?<><span style={{width:6,height:6,borderRadius:'50%',background:'#14A06E'}}/>{d.stops} {d.stops===1?'stop':'stops'}</>:'+ add places'}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );

  if(isPreTrip){
    const daysAway=-dayIndex;
    return(
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
        <div style={{flexShrink:0,padding:'20px 18px 14px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#FB7242'}}><AnchorIco size={13}/> {trip.destination}</div>
            <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:24,color:'#16172A',marginTop:3}}>Coming soon</div>
          </div>
          <EditBtn/>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          <div style={{padding:'40px 24px 32px',textAlign:'center',background:'linear-gradient(180deg,#F1EEFF 0%,#FAFAFD 100%)'}}>
            <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:88,color:'#6C5CE7',lineHeight:1}}>{daysAway}</div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:18,color:'#353756',fontWeight:600,marginTop:4}}>{daysAway===1?'day':'days'} until Tokyo</div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#9092AD',marginTop:8}}>{trip.arrivalDate&&fmtDateLong(trip.arrivalDate)} → {trip.departureDate&&fmtDateLong(trip.departureDate)}</div>
            <div style={{display:'inline-block',marginTop:14,background:'#fff',borderRadius:12,padding:'8px 16px',fontFamily:"'Geist Mono',monospace",fontSize:13,color:'#6C5CE7',fontWeight:600,boxShadow:'0 2px 8px rgba(22,23,42,0.08)'}}>{trip.nights} nights · {trip.anchors?.length||0} anchor{trip.anchors?.length!==1?'s':''}</div>
          </div>
          {trip.anchors&&trip.anchors.length>0&&(
            <div style={{padding:'0 18px 16px'}}>
              <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',letterSpacing:'0.10em',textTransform:'uppercase',marginBottom:12}}>Your anchors</div>
              {trip.anchors.map(a=>(
                <Photo key={a.id} name={a.name} area={a.area} grad="linear-gradient(135deg,#9AA0FF,#6C5CE7)" emoji="🏨" emojiSize={38} scrim="linear-gradient(120deg,rgba(40,30,90,0.60) 0%,rgba(40,30,90,0.28) 100%)" style={{borderRadius:20,padding:'16px 15px',marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
                  <div style={{position:'relative',width:44,height:44,borderRadius:12,background:'rgba(255,255,255,0.22)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><AnchorIco size={22} color="#fff"/></div>
                  <div style={{position:'relative'}}>
                    <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:17,color:'#fff',lineHeight:1.1,textShadow:'0 1px 4px rgba(0,0,0,0.35)'}}>{a.name}</div>
                    <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'rgba(255,255,255,0.82)',marginTop:2,textShadow:'0 1px 3px rgba(0,0,0,0.3)'}}>{a.area} · {fmtDate(a.checkin)} – {fmtDate(a.checkout)}</div>
                  </div>
                </Photo>
              ))}
            </div>
          )}
          <div style={{padding:'4px 0 8px'}}><ItineraryStrip/></div>
          <div style={{padding:'8px 18px 36px'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginBottom:12}}>While you wait, explore what's waiting:</div>
            <button onClick={()=>goTab&&goTab('discover')} style={{width:'100%',background:'#6C5CE7',color:'#fff',border:'none',borderRadius:16,padding:'14px',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:17,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:'0 6px 18px rgba(108,92,231,0.30)'}}>
              <SparkleIco size={18}/> Browse Tokyo picks
            </button>
          </div>
        </div>
      </div>
    );
  }

  if(isPostTrip) return(
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
      <div style={{flexShrink:0,padding:'20px 18px 14px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#FB7242'}}><AnchorIco size={13}/> Tokyo wrapped ✈</div>
          <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:24,color:'#16172A',marginTop:3}}>{trip.arrivalDate&&fmtMonthYear(trip.arrivalDate)}</div>
        </div>
        <EditBtn/>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'48px 24px',textAlign:'center'}}>
        <div style={{fontSize:56,marginBottom:14}}>🎌</div>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:800,fontSize:28,color:'#16172A'}}>Tokyo's a wrap!</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',marginTop:8}}>{trip.nights} nights · {trip.anchors?.length||0} anchor{trip.anchors?.length!==1?'s':''}</div>

function sourceUrls(name,area,googleUrl){
  const q=encodeURIComponent(`${name} ${area||''} Tokyo`.trim());
  return {
    google:googleUrl||`https://www.google.com/maps/search/?api=1&query=${q}`,
    yelp:`https://www.yelp.com/search?find_desc=${encodeURIComponent(name)}&find_loc=${encodeURIComponent(((area||'')+' Tokyo').trim())}`,
    tabelog:`https://tabelog.com/en/rst/rstsearch/?sw=${encodeURIComponent(name)}`,
  };
}
function SourceLinks({name,area,googleUrl,label=true}){
  const u=sourceUrls(name,area,googleUrl);
  const items=[
    {k:'Google',href:u.google,color:'#4285F4'},
    {k:'Yelp',href:u.yelp,color:'#D32323'},
    {k:'Tabelog',href:u.tabelog,color:'#C9A24B',jp:'食'},
  ];
  return(
    <div>
      {label&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'#9092AD',marginBottom:7}}>Read reviews</div>}
      <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
        {items.map(it=>(
          <a key={it.k} href={it.href} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
            style={{display:'inline-flex',alignItems:'center',gap:6,border:'1.5px solid #E3E5F0',background:'#fff',borderRadius:999,padding:'7px 12px',textDecoration:'none',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12.5,fontWeight:600,color:'#4E5072'}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:it.color,flexShrink:0}}/>{it.jp?it.jp+' ':''}{it.k}
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#B6B8CC" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>
          </a>
        ))}
      </div>
    </div>
  );
}

/* Swipe-to-save / swipe-to-skip wrapper. Right = save, left = skip; small drag = tap. */
function SwipeCard({onSwipeRight,onSwipeRightFar,onSwipeLeft,onTap,labels={},children}){
  const L={near:'Save',far:'Anchor',left:'Skip ✕',...labels};
  const NEAR=80, FAR=185;
  const [dx,setDx]=useState(0);
  const [anim,setAnim]=useState(false);
  const st=React.useRef({x:0,y:0,drag:false,decided:false,horiz:false});
  // No pointer capture: that would steal the gesture from the scroll container and block vertical scroll.
  const down=e=>{
    if(e.target&&e.target.closest&&e.target.closest('button,a')){st.current.drag=false;return;}
    st.current={x:e.clientX,y:e.clientY,drag:true,decided:false,horiz:false}; setAnim(false);};
  const move=e=>{const s=st.current; if(!s.drag) return; const ddx=e.clientX-s.x, ddy=e.clientY-s.y;
    if(!s.decided&&(Math.abs(ddx)>8||Math.abs(ddy)>8)){s.decided=true; s.horiz=Math.abs(ddx)>Math.abs(ddy);}
    if(s.decided&&s.horiz){setDx(ddx);} };
  // commit=false (pointercancel from a vertical scroll) must NOT fire a tap.
  const finish=(commit)=>{const s=st.current; if(!s.drag) return; s.drag=false; const d=dx;
    if(commit&&s.horiz&&d>FAR&&onSwipeRightFar){setAnim(true);setDx(560);setTimeout(()=>onSwipeRightFar(),190);return;}
    if(commit&&s.horiz&&d>NEAR&&onSwipeRight){setAnim(true);setDx(560);setTimeout(()=>onSwipeRight(),190);return;}
    if(commit&&s.horiz&&d<-NEAR&&onSwipeLeft){setAnim(true);setDx(-560);setTimeout(()=>onSwipeLeft(),190);return;}
    if(commit&&!s.decided&&Math.abs(d)<6&&onTap){onTap();} // only an undecided, near-still gesture is a tap
    setAnim(true);setDx(0); };
  const up=()=>finish(true);
  const cancel=()=>finish(false);
  const far=dx>FAR&&onSwipeRightFar;
  const rOp=dx>0?Math.min(dx/NEAR,1):0, lOp=dx<0?Math.min(-dx/NEAR,1):0;
  const rLabel=far?L.far:L.near, rColor=far?'#ED5A2A':'#0E865B';
  const rBg=far?'linear-gradient(90deg,#FFE0CF 0%,#FFF4EC 60%)':'linear-gradient(90deg,#D6F5E6 0%,#F4FBF7 60%)';
  return(
    <div style={{position:'relative',borderRadius:20,overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 22px',
        background:dx>0?rBg:dx<0?'linear-gradient(90deg,#F6F6FA 40%,#ECEDF6 100%)':'transparent'}}>
        <span style={{opacity:rOp,display:'inline-flex',alignItems:'center',gap:6,color:rColor,fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,fontSize:15,transition:'color .12s'}}>{rLabel}</span>
        <span style={{opacity:lOp,display:'inline-flex',alignItems:'center',gap:6,color:'#6C6E8E',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,fontSize:15}}>{L.left}</span>
      </div>
      <div onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={cancel}
        style={{transform:`translateX(${dx}px) rotate(${dx*0.016}deg)`,transition:anim?'transform .19s ease':'none',touchAction:'pan-y',position:'relative'}}>
        {children}
      </div>
    </div>
  );
}

function ThumbIco({up=true,size=15,color='#6C6E8E'}){
  return up
    ? <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"/></svg>
    : <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 14V2"/><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a3.13 3.13 0 0 1-3-3.88Z"/></svg>;
}

// Short, human label for an anchor chip/pill ("Park Hyatt Tokyo" -> "Park Hyatt").
function anchorShort(a){ return ((a&&a.name)||'anchor').replace(/\s+(hotel|hostel|inn|tokyo)$/i,'').split(' ').slice(0,2).join(' '); }
// Straight-line distance + walk estimate from a place to the chosen anchor.
// Falls back to a neighborhood match when either side has no coordinates.
function AnchorDistPill({place,anchor}){
  if(!anchor) return null;
  const base={display:'inline-flex',alignItems:'center',gap:5,background:'#EEF0FF',border:'1px solid #D9DEFF',borderRadius:999,padding:'4px 10px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11.5,fontWeight:600,color:'#4836B4'};
  const short=anchorShort(anchor);
  const pc=parseCoords(place&&place.coords), ac=parseCoords(anchor.coords);
  if(pc&&ac){
    const m=haversineM(pc,ac);
    return <span style={base}><WalkIco size={12} color="#4836B4"/> {fmtDist(m)} · {walkMin(m)} to {short}</span>;
  }
  const pa=((place&&place.area)||'').toLowerCase(), aa=(anchor.area||'').toLowerCase();
  if(pa&&aa&&pa===aa) return <span style={base}><AnchorIco size={11} color="#4836B4"/> Same area as {short}</span>;
  return null;
}

function DiscoverScreen({push,trip,onSave,onAnchor,onSkip,onResetDismiss,onLike,onOptimize,optimizing}) {
  const chips=['Counter dining','Offcuts & izakaya','Quiet mornings','Specialty coffee','Vintage','Slow afternoons'];
  const prefs=trip.prefs||[];
  const hasPrefs=prefs.length>0;
  const taste=trip.taste||{likes:[],dislikes:[]};
  const likeTags=taste.likes||[], dislikeTags=taste.dislikes||[];
  // Anchor (hotel) the feed measures distance from. Pick among several; default first.
  const allAnchors=trip.anchors||[];
  const [distAnchorId,setDistAnchorId]=useState(null);
  const distAnchor=allAnchors.find(a=>a.id===distAnchorId)||allAnchors[0]||null;
  const prefsKey=JSON.stringify(prefs);
  const fullPool=useMemo(()=>getSuggestions(prefs,8,[],true),[prefsKey]); // strict: only pref-matched, no random backfill
  const [ai,setAi]=useState(null);
  useEffect(()=>{
    let dead=false;
    API.suggest(prefs,fullPool).then(ranked=>{
      if(dead) return;
      if(ranked&&ranked.length){const m={};ranked.forEach(r=>{if(PLACES[r.id])m[r.id]=r;});setAi(m);}
      else setAi(null);
    });
    return ()=>{dead=true;};
  },[prefsKey]); // eslint-disable-line
  const reasonFor=p=>(ai&&ai[p.id]&&ai[p.id].reason)||p.reason||p.note||p.digest||'';
  const hay=p=>((p.name||'')+' '+(p.catLabel||'')+' '+(p.category||'')+' '+(p.area||'')+' '+reasonFor(p)).toLowerCase();
  const matchesAny=(p,tags)=>{const h=hay(p);return tags.some(t=>t&&h.includes(t));};
  const saved=new Set((trip.scratchpad||[]).map(s=>s.sourceId).filter(Boolean));
  const anchored=new Set(trip.anchoredPlaces||[]);
  const dismissed=new Set(trip.dismissedPlaces||[]);
  let visible=fullPool.filter(p=>!saved.has(p.id)&&!anchored.has(p.id)&&!dismissed.has(p.id));
  if(dislikeTags.length) visible=visible.filter(p=>!matchesAny(p,dislikeTags));
  const scoreOf=p=>(matchesAny(p,likeTags)?1000:0)+(ai&&ai[p.id]?ai[p.id].score:0);
  const ordered=[...visible].sort((a,b)=>scoreOf(b)-scoreOf(a)).map(p=>({...p,__real:false}));
  // Brand-new real places pulled from learned taste sit at the top of the feed.
  let found=(trip.discovered||[]).map(p=>({...p,__real:true})).filter(p=>!saved.has(p.id)&&!dismissed.has(p.id));
  if(dislikeTags.length) found=found.filter(p=>!matchesAny(p,dislikeTags));
  const feed=[...found,...ordered];
  const swipes=trip.discoverSwipes||0;
  const showOptimize=swipes>=10;

  const renderCard=p=>{
    const real=p.__real;
    const grad=real?'linear-gradient(135deg,#5BD6B0,#8B72FB)':p.catGrad;
    const label=real?(p.category||'Place'):p.catLabel;
    const likeTag=(real?(p._foundFor||p.category||''):(p.catLabel||'')).toLowerCase();
    const why=likeTags.find(t=>t&&hay(p).includes(t));
    return (
      <SwipeCard key={p.id} labels={{near:'Scratchpad',far:'Anchor',left:'Skip ✕'}}
        onSwipeRight={()=>onSave&&onSave(p)} onSwipeRightFar={()=>onAnchor&&onAnchor(p)}
        onSwipeLeft={()=>onSkip&&onSkip(p)} onTap={()=>real?(p.googleUrl&&window.open(p.googleUrl,'_blank','noopener')):push({type:'place',id:p.id})}>
      <div style={{background:'#fff',borderRadius:20,padding:12,boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 6px 16px rgba(22,23,42,0.06)',cursor:'pointer'}}>
        <div style={{display:'flex',gap:13}}>
          <Photo name={p.name} area={p.area} grad={grad} emoji={placeEmoji(p)} emojiSize={32} scrim="linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,0.32) 100%)" style={{width:80,height:80,borderRadius:14,flexShrink:0,display:'flex',alignItems:'flex-end',padding:7}}>
            <span style={{position:'relative',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.95)',background:'rgba(0,0,0,0.16)',padding:'3px 7px',borderRadius:999}}>{label}</span>
          </Photo>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:6}}>
              <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:16,color:'#16172A',lineHeight:1.1,flex:1}}>{p.name}</div>
              <BudgetBadge budget={p.budget}/>
            </div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD',marginTop:2}}>{real?(p.area||'Tokyo'):`${p.area} · ${p.station}`}</div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6,flexWrap:'wrap'}}>
              <Ratings rating={p.rating} tabelogRating={p.tabelogRating}/>
              <StatusPill openNow={p.openNow} small/>
            </div>
          </div>
        </div>
        <div style={{marginTop:9,display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
          {distAnchor&&<AnchorDistPill place={p} anchor={distAnchor}/>}
          {real
            ? <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'#E6FAF0',border:'1px solid #BCEBD3',borderRadius:999,padding:'4px 10px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11.5,fontWeight:600,color:'#0E865B'}}><SparkleIco size={12} color="#0E865B"/> Found for “{p._foundFor}”</span>
            : <MatchTag mp={p._matchPref}/>}
          {!real&&why&&<span style={{display:'inline-flex',alignItems:'center',gap:5,background:'#E6FAF0',border:'1px solid #BCEBD3',borderRadius:999,padding:'4px 10px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11.5,fontWeight:600,color:'#0E865B'}}><SparkleIco size={12} color="#0E865B"/> Matches your taste · {why}</span>}
        </div>
        {!real&&reasonFor(p)&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#5A48D6',lineHeight:1.45,marginTop:9,fontStyle:'italic'}}>{reasonFor(p)}</div>}
        <div style={{marginTop:10,display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
          <SourceLinks name={p.name} area={p.area} googleUrl={real?p.googleUrl:undefined} label={false}/>
          <div style={{display:'flex',gap:7,flexShrink:0}}>
            <button onClick={e=>{e.stopPropagation();onLike&&onLike(likeTag);}} aria-label="Like" title="More like this"
              style={{width:34,height:34,borderRadius:10,border:'1.5px solid #CFEFDD',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ThumbIco up size={15} color="#0E865B"/></button>
            <button onClick={e=>{e.stopPropagation();onSkip&&onSkip(p);}} aria-label="Not for me" title="Not for me"
              style={{width:34,height:34,borderRadius:10,border:'1.5px solid #F0D9D9',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ThumbIco up={false} size={15} color="#D8553C"/></button>
          </div>
        </div>
      </div>
      </SwipeCard>
    );
  };

  return (
    <div style={{position:'absolute',inset:0,overflowY:'auto'}}>
      <div style={{padding:'16px 18px 8px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
          <div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#9092AD'}}>Discover · Tokyo</div>
            <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:27,color:'#16172A',lineHeight:1.06,marginTop:4,letterSpacing:'-0.02em'}}>{hasPrefs?<>Picked for how<br/>you travel</>:<>Popular in<br/>Tokyo</>}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:7,flexShrink:0}}>
            <button onClick={()=>push({type:'discoverchat'})} aria-label="Train Anchor" style={{display:'inline-flex',alignItems:'center',gap:6,border:'none',background:'linear-gradient(135deg,#8B72FB,#6C5CE7)',color:'#fff',borderRadius:999,padding:'9px 13px',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:13,cursor:'pointer',boxShadow:'0 4px 12px rgba(108,92,231,0.35)'}}>
              <SparkleIco size={14} color="#fff"/> Train
            </button>
            <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'#fff',border:'1px solid '+(showOptimize?'#F6C9B5':'#E3E5F0'),borderRadius:999,padding:'5px 10px',fontFamily:"'Geist Mono',monospace",fontSize:12,fontWeight:600,color:showOptimize?'#ED5A2A':'#6C6E8E'}}>
              {swipes}{showOptimize?' swiped · ready':` / 10 swiped`}
            </span>
          </div>

/* Offline fallback for the training chat when /api/refine (DeepSeek) is unavailable:
   pull a short tag out of the message and decide like vs dislike from the wording. */
function localTaste(message){
  const m=' '+message.toLowerCase()+' ';
  const neg=/\b(no|not|hate|avoid|don'?t|dislike|skip|without|less|nope|never)\b/.test(m);
  const tag=message
    .replace(/\b(i|i'?m|really|love|like|want|prefer|enjoy|into|more|some|a|an|the|of|to|please|no|not|hate|avoid|don'?t|dislike|skip|without|less|my|me|we|you|tokyo|places?|spots?|and|or|with|for|that|are|is|too|very)\b/gi,' ')
    .replace(/[^a-zA-Z\s&-]/g,' ').replace(/\s+/g,' ').trim().toLowerCase().split(' ').filter(Boolean).slice(0,3).join(' ');
  if(!tag) return {reply:"Got it — tell me a cuisine, vibe or setting and I'll tune your feed.",add_likes:[],add_dislikes:[],local:true};
  return neg
    ? {reply:`Noted — I'll steer your feed away from ${tag}.`,add_likes:[],add_dislikes:[tag],local:true}
    : {reply:`Love it — I'll lean your feed into ${tag}.`,add_likes:[tag],add_dislikes:[],local:true};
}

function fmtDist(m){ if(m==null) return '—'; m=Math.round(m); return m<1000?`${m} m`:`${(m/1000).toFixed(1)} km`; }
function walkMin(m){ if(m==null) return ''; return `${Math.max(1,Math.round(m/80))} min`; } // ~80 m/min
// The app stores coords as a "lat, lng" string (curated data + Google results).
function parseCoords(c){
  if(!c) return null;
  if(typeof c==='object'&&c.lat!=null&&c.lng!=null) return {lat:+c.lat,lng:+c.lng};
  const m=String(c).match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);
  return m?{lat:+m[1],lng:+m[2]}:null;
}
// Straight-line distance in metres (haversine). Free, instant, no API call.
function haversineM(a,b){
  if(!a||!b) return null;
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s)));
}
function nowTime(){ return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }

// Plot real nearby places around "you" (centre). North is up; east is right.
function nearPinsFrom(coords,places){
  const pins=[{id:'you',x:50,y:50,kind:'you'}];
  if(!coords) return pins;
  const top=places.slice(0,5).filter(p=>p.lat!=null);
  const maxM=Math.max(...top.map(p=>p.meters||0),1);
  const cosLat=Math.cos(coords.lat*Math.PI/180);
  top.forEach((p,i)=>{
    const north=(p.lat-coords.lat)*111000;
    const east=(p.lng-coords.lng)*111000*cosLat;
    const f=38/maxM;
    const x=Math.max(7,Math.min(93,50+east*f));
    const y=Math.max(10,Math.min(92,50-north*f));
    pins.push({id:'n'+i,x,y,num:i+1,kind:'suggest'});
  });
  return pins;
}

function NearScreen({push,filter,setFilter,onSaveNear,trip}) {
  const [coords,setCoords]=useState(null);
  const [geo,setGeo]=useState('idle'); // idle|locating|denied|unsupported|error|ready
  const [data,setData]=useState({loading:false,places:[],error:null});
  const [saved,setSaved]=useState({});
  const [tasteNear,setTasteNear]=useState({ran:false,loading:false,places:[]});

  const locate=React.useCallback(()=>{
    if(typeof navigator==='undefined'||!navigator.geolocation){ setGeo('unsupported'); return; }
    setGeo('locating');
    navigator.geolocation.getCurrentPosition(
      pos=>{ setCoords({lat:pos.coords.latitude,lng:pos.coords.longitude}); setGeo('ready'); },
      err=>{ setGeo(err&&err.code===1?'denied':'error'); },
      {enableHighAccuracy:true,timeout:12000,maximumAge:60000}
    );
  },[]);
  useEffect(()=>{ locate(); },[locate]);

  useEffect(()=>{
    if(!coords) return;
    let dead=false; setData(d=>({...d,loading:true,error:null}));
    const type=filter==='food'?'food':filter==='coffee'?'coffee':'all';
    API.near(coords.lat,coords.lng,{type}).then(res=>{
      if(dead) return;
      if(res.error){ setData({loading:false,places:[],error:res}); return; }
      setData({loading:false,places:res.places||[],error:null});
    });
    return ()=>{dead=true;};
  },[coords,filter]);

  const taste=(trip&&trip.taste)||{likes:[],dislikes:[]};
  const likeTags=taste.likes||[], dislikeTags=taste.dislikes||[];
  const tHay=p=>((p.name||'')+' '+(p.category||'')+' '+(p.area||'')).toLowerCase();

  const pins=nearPinsFrom(coords,places);

    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>

          <div style={{fontFamily:"'Geist Mono',monospace",fontSize:13,color:'#6C6E8E'}}>{nowTime()}</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {geo==='ready'&&coords&&(
          <div style={{padding:'12px 18px 4px'}}>

              <AnchorMap pins={pins} connect={false} height="106px"/>

        {geo==='ready'&&(
          <div style={{display:'flex',gap:8,overflowX:'auto',padding:'10px 18px'}}>

          </div>
        )}

        {geo==='locating'&&<Msg title="Finding where you are…" body="Checking your location to show what's actually around you."/>}
        {geo==='denied'&&<Msg title="Location is off" body="Turn on location access for this site to see places near you right now." action={locate} actionLabel="Try again"/>}
        {geo==='unsupported'&&<Msg title="Location unavailable" body="This device can't share its location, so Near can't show what's around you."/>}
        {geo==='error'&&<Msg title="Couldn't get your location" body="Something went wrong reading your position. Try again." action={locate} actionLabel="Try again"/>}

        {geo==='ready'&&data.loading&&<Msg title="Looking around you…" body="Pulling live places within walking distance."/>}
        {geo==='ready'&&!data.loading&&data.error&&data.error.error==='missing_key'&&
          <Msg title="Live nearby isn't configured" body="Near needs the Google Places key set on the server to show real places around you."/>}
        {geo==='ready'&&!data.loading&&data.error&&data.error.error!=='missing_key'&&
          <Msg title="Couldn't load nearby places" body="The live search didn't respond. Try again in a moment." action={()=>setCoords(c=>c&&{...c})} actionLabel="Retry"/>}
        {geo==='ready'&&!data.loading&&!data.error&&places.length===0&&
          <Msg title="Nothing open nearby" body="No matching places within walking distance right now. Try a different filter."/>}

        {geo==='ready'&&!data.loading&&!data.error&&places.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:10,padding:'0 18px 24px'}}>
            {tasteNear.ran&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:700,color:'#6C6E8E',padding:'2px 2px 0'}}>Everything around you</div>}
            {places.map(n=><NearRow key={n.googleUrl||n.name} n={n}/>)}
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11.5,color:'#B6B8CC',textAlign:'center',marginTop:2}}>Live from Google · tap a place for directions</div>

        )}
      </div>
    </div>
  );
}

/* ── SEARCH = TOKYO LOCAL CONCIERGE ── */
function SearchScreen({push,onStash,trip,onLearn,onSetup}) {
  // The Search tab IS the app's home + setup: a conversation with a knowledgeable
  // Tokyo local (Claude) that recommends real places, learns your taste, AND
  // gathers your trip setup (hotel/dates/interests) — no separate onboarding form.
  const anchor0=(trip.anchors&&trip.anchors[0])||null;
  const hotelArea=(anchor0&&anchor0.area)||trip.hotelArea||'';
  const hotelName=(anchor0&&anchor0.name)||'';
  const needsSetup=tripNeedsSetup(trip);
  const greet=needsSetup
    ? "Hey — I'm your Tokyo local, and I'll help you plan this whole trip right here. To start: where are you staying (a hotel or a neighborhood), and roughly when's the trip?"
    : (hotelArea
      ? `Hey — I'm your Tokyo local. You're around ${hotelArea}, nice. What are you in the mood for — coffee, a first dinner, something to do tomorrow?`
      : "Hey — I'm your Tokyo local. Tell me what you're into and I'll point you to places you'd actually love.");
  const [msgs,setMsgs]=useState([{role:'anchor',text:greet}]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [saved,setSaved]=useState({});
  const scrollRef=React.useRef(null);
  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },[msgs,busy]);

  const context=()=>({
    taste:trip.taste||{likes:[],dislikes:[]},
    prefs:trip.prefs||[],
    hotelArea, hotelName, arrivalDate:trip.arrivalDate, nights:trip.nights,
    saved:[...(trip.scratchpad||[]).map(s=>s.name).filter(Boolean),
      ...((trip.anchoredPlaces||[]).map(id=>(typeof PLACES!=='undefined'&&PLACES[id]&&PLACES[id].name)).filter(Boolean))].slice(0,20),
  });
  const send=async(preset)=>{
    const text=(preset||input).trim(); if(!text||busy) return;
    const hist=[...msgs,{role:'user',text}].slice(-16).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
    setMsgs(m=>[...m,{role:'user',text}]); setInput(''); setBusy(true);
    const res=await API.concierge(hist,context());
    setBusy(false);
    if(onLearn&&res.learned&&((res.learned.likes&&res.learned.likes.length)||(res.learned.dislikes&&res.learned.dislikes.length)))
      onLearn(res.learned.likes||[],res.learned.dislikes||[]);
    if(onSetup&&res.updates&&Object.keys(res.updates).length) onSetup(res.updates);
    setMsgs(m=>[...m,{role:'anchor',text:res.reply||'Tell me a bit more?',places:res.places||[],chips:res.chips||[],learned:res.learned||null,updates:res.updates||null}]);
  };
  const savePlace=(p,key)=>{ onStash&&onStash(p,'idea'); setSaved(s=>({...s,[key]:true})); };
  const mapsUrl=p=>'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(`${p.name} ${p.area||''} Tokyo`);
  const lastIdx=msgs.length-1;

  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',background:'#FAFAFD'}}>
      <div style={{flexShrink:0,padding:'16px 18px 12px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6',display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,#FB7242,#F857A6)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{fontSize:20}}>⚓</span></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,color:'#16172A',lineHeight:1.1}}>Your Tokyo local</div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginTop:1}}>{needsSetup?'Plan + recommendations, all in chat':'Chat for recommendations — the more you talk, the better'}</div>
        </div>
        <button onClick={()=>push({type:'trip'})} aria-label="Trip controls" style={{flexShrink:0,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1,border:'1.5px solid '+(needsSetup?'#FBD9C9':'#E3E5F0'),background:needsSetup?'#FFF4EE':'#fff',borderRadius:12,padding:'7px 11px',cursor:'pointer'}}>
          <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,fontSize:12.5,color:needsSetup?'#E05B2B':'#16172A',lineHeight:1.1}}>{needsSetup?'Set up trip':(hotelArea||'Tokyo')}</span>
          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10.5,color:'#9092AD'}}>{needsSetup?'or just chat':(trip.nights?`${trip.nights} nights`:'dates TBD')}</span>
        </button>
      </div>

      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'16px 14px 8px',display:'flex',flexDirection:'column',gap:13}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',flexDirection:'column',gap:9,width:'100%'}}>
            <div style={{alignSelf:m.role==='user'?'flex-end':'flex-start',maxWidth:'88%',background:m.role==='user'?'linear-gradient(135deg,#8B72FB,#6C5CE7)':'#fff',color:m.role==='user'?'#fff':'#16172A',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',padding:'11px 14px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14.5,lineHeight:1.5,boxShadow:'0 1px 2px rgba(22,23,42,0.06)'}}>{m.text}</div>

            {m.learned&&((m.learned.likes&&m.learned.likes.length)||(m.learned.dislikes&&m.learned.dislikes.length))?(
