function ScratchpadOverlay({pop,trip,onAdd,onAnchor,onRemove}){
  const [q,setQ]=useState('');
  const [note,setNote]=useState('');
  const [finding,setFinding]=useState(false);
  const [preview,setPreview]=useState(null);
  const [err,setErr]=useState(null);
  const items=[...(trip.scratchpad||[])].reverse();

  const find=async()=>{
    const term=q.trim(); if(term.length<2||finding) return;
    setFinding(true); setErr(null); setPreview(null);
    // 1) Let Anchor (DeepSeek) clean a messy note or a Google/Yelp link into a query.
    let query=term, area='', parsedNote='';
    const parsed=await API.parsePlace(term);
    if(parsed && !parsed.error){
      if(parsed.query) query=parsed.query;
      if(parsed.area) area=parsed.area;
      if(parsed.note) parsedNote=parsed.note;
    }
    if(!query){setFinding(false);setErr('Couldn’t spot a place in that — try the name directly.');return;}
    // 2) Enrich the cleaned query via Google.
    const res=await API.places(query,area,1);
    setFinding(false);
    if(res.error){setErr(res.message||'Search is unavailable right now.');return;}
    if(!res.places||!res.places.length){setErr('Couldn’t find that one — try a fuller name.');return;}
    setPreview(res.places[0]);
    if(parsedNote && !note.trim()) setNote(parsedNote);
  };
  const confirmAdd=()=>{
    if(!preview) return;
    onAdd({id:'s'+Date.now(),status:'idea',note:note.trim(),addedAt:Date.now(),
      name:preview.name,area:preview.area,rating:preview.rating,reviews:preview.reviews,
      openNow:preview.openNow,budget:preview.budget,hours:preview.hours,address:preview.address,
      category:preview.category,googleUrl:preview.googleUrl,coords:preview.coords});
    setQ('');setNote('');setPreview(null);setErr(null);
  };

  return(
    <div style={{position:'absolute',inset:0,zIndex:40,background:'#FAFAFD',display:'flex',flexDirection:'column',animation:'slideIn .28s cubic-bezier(0.22,1,0.36,1)'}}>
      <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:12,padding:'16px 16px 12px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6'}}>
        <BackBtn onClick={pop}/>
        <div>
          <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,color:'#16172A',lineHeight:1.1}}>Scratchpad</div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginTop:1}}>Places to sort later · {items.length}</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'14px 18px 28px'}}>
        <div style={{background:'#fff',borderRadius:18,padding:'14px',boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 6px 16px rgba(22,23,42,0.06)',marginBottom:16}}>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:9}}>Add a place</div>
          <textarea value={q} onChange={e=>{setQ(e.target.value);setPreview(null);setErr(null);}} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();find();}}}
            placeholder="Paste a name, a note, or a Google / Yelp link — e.g. “that coffee spot near Yoyogi Kenji mentioned”"
            style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:12,padding:'12px 14px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#16172A',outline:'none',resize:'none',lineHeight:1.45,minHeight:64}}/>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Who suggested it / why (optional)"
            style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:12,padding:'10px 14px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#353756',outline:'none',marginTop:8}}/>
          {!preview&&<button onClick={find} disabled={q.trim().length<2||finding} style={{marginTop:10,width:'100%',border:'none',borderRadius:12,background:q.trim().length>=2&&!finding?'#6C5CE7':'#E3E5F0',color:'#fff',fontWeight:600,fontSize:14.5,padding:'11px',cursor:q.trim().length>=2&&!finding?'pointer':'default',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7}}>
            <SparkleIco size={16}/> {finding?'Anchor is reading…':'Find it'}
          </button>}
          {err&&<div style={{marginTop:10,background:'#FFF1EA',borderRadius:10,padding:'9px 12px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#8a4a2c'}}>{err}</div>}
          {preview&&(
            <div style={{marginTop:12}}>
              <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD',marginBottom:7}}>Anchor found:</div>
              <GoogleResultCard p={preview}/>
              <div style={{display:'flex',gap:9,marginTop:10}}>
                <button onClick={confirmAdd} style={{flex:1,border:'none',borderRadius:12,background:'#14A06E',color:'#fff',fontWeight:600,fontSize:14.5,padding:'11px',cursor:'pointer'}}>Add to scratchpad</button>

}

/* ── DAY PLAN ── */
function DayPlanOverlay({dayIndex,pop,push,trip,onAdd,onRemove,onMove,onOptimized}){
  const day=tripDays(trip)[dayIndex]||{index:dayIndex,date:''};
  const hotel=trip.anchors?.[0];
  const refs=dayStopsRefs(trip,dayIndex);
  const stops=refs.map(r=>({ref:r,d:resolveStop(trip,r)})).filter(x=>x.d);
  const pool=unscheduledPool(trip).map(r=>({ref:r,d:resolveStop(trip,r)})).filter(x=>x.d);
  const [opt,setOpt]=useState({loading:false,rationale:'',err:null});

  const optimize=async()=>{
    if(stops.length<2||opt.loading) return;
    setOpt({loading:true,rationale:'',err:null});
    const payload=stops.map(({ref,d})=>({id:`${ref.kind}:${ref.id}`,name:d.name,area:d.area,category:d.category||'',coords:d.coords||'',hours:d.hours||'',openNow:d.openNow||''}));
    const data=await API.optimize(day.date,hotel?.area||'',payload);
    if(data.error){setOpt({loading:false,rationale:'',err:data.message||'Optimize failed.'});return;}
    const byKey={}; stops.forEach(({ref})=>{byKey[`${ref.kind}:${ref.id}`]=ref;});
    const ordered=(data.ordered||[]).map(o=>{const ref=byKey[o.id];return ref?{kind:ref.kind,id:ref.id,time:o.time||''}:null;}).filter(Boolean);
    if(ordered.length){onOptimized(dayIndex,ordered);setOpt({loading:false,rationale:data.rationale||'',err:null});}
    else setOpt({loading:false,rationale:'',err:'Couldn’t optimize — try again.'});
  };

  return(
    <div style={{position:'absolute',inset:0,zIndex:40,background:'#FAFAFD',display:'flex',flexDirection:'column',animation:'slideIn .28s cubic-bezier(0.22,1,0.36,1)'}}>
      <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:12,padding:'16px 16px 12px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6'}}>
        <BackBtn onClick={pop}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:18,color:'#16172A',lineHeight:1.1}}>Day {dayIndex+1} · plan</div>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginTop:1}}>{day.date?fmtDateLong(day.date):''}{hotel?` · ${hotel.area}`:''}</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'14px 18px 28px'}}>
        {stops.length>=2&&(
          <button onClick={optimize} disabled={opt.loading} style={{width:'100%',marginBottom:14,border:'none',borderRadius:14,background:'linear-gradient(135deg,#6C5CE7,#FB7242)',color:'#fff',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:15.5,padding:'13px',cursor:opt.loading?'default':'pointer',boxShadow:'0 6px 18px rgba(108,92,231,0.3)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <SparkleIco size={17}/> {opt.loading?'Anchor is arranging your day…':'Optimize this day for me'}
          </button>
        )}
        {opt.rationale&&(
          <div style={{display:'flex',gap:8,background:'#F1EEFF',borderRadius:12,padding:'11px 13px',marginBottom:14}}>
            <SparkleIco size={15} color="#6C5CE7"/>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,color:'#4836B4',lineHeight:1.45}}>{opt.rationale}</div>
          </div>
        )}
        {opt.err&&<div style={{background:'#FFF1EA',borderRadius:12,padding:'10px 13px',marginBottom:14,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,color:'#8a4a2c'}}>{opt.err}</div>}

        {hotel&&(
          <div style={{display:'flex',gap:11,alignItems:'stretch',marginBottom:10}}>
            <div style={{width:50,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:14}}>
              <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,fontWeight:600,color:'#6C5CE7'}}>Base</span>
            </div>
            <div style={{flex:1,minWidth:0,background:'linear-gradient(135deg,#F1EEFF 0%,#FBFAFF 100%)',border:'1.5px solid #E3DCFF',borderRadius:16,padding:'11px 12px'}}>
              <div style={{display:'flex',gap:11,alignItems:'center'}}>
                <Photo name={hotel.name} area={hotel.area} grad="linear-gradient(135deg,#9AA0FF,#6C5CE7)" style={{width:42,height:42,borderRadius:11,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'inline-flex',alignItems:'center',gap:4,background:'#E4DEFF',borderRadius:999,padding:'2px 8px',marginBottom:3}}>
                    <AnchorIco size={10} color="#5A48D6"/><span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:10.5,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',color:'#5A48D6'}}>Your hotel</span>
                  </div>
                  <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:15,color:'#16172A',lineHeight:1.1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{hotel.name}</div>
                  <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD',marginTop:2}}>{hotel.area} · start &amp; end your day here</div>
                </div>
              </div>
            </div>
          </div>
        )}
        {stops.length===0?(
          <div style={{textAlign:'center',padding:'8px 24px 24px'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14.5,color:'#9092AD',lineHeight:1.5}}>Add places below, then let Anchor arrange your day around your hotel.</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {stops.map(({ref,d},i)=>(
              <div key={ref.kind+ref.id} style={{display:'flex',gap:11,alignItems:'stretch'}}>
                <div style={{width:50,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:13}}>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:13,fontWeight:600,color:'#6C5CE7'}}>{d.time||'—'}</span>
                </div>
                <div style={{flex:1,minWidth:0,background:'#fff',borderRadius:16,padding:'11px 12px',boxShadow:'0 1px 2px rgba(22,23,42,0.05),0 5px 14px rgba(22,23,42,0.05)'}}>
                  <div style={{display:'flex',gap:11,alignItems:'center'}}>
                    <Photo name={d.name} area={d.area} grad={d.catGrad} emoji={placeEmoji(d)} emojiSize={20} onClick={()=>ref.kind==='curated'&&push({type:'place',id:ref.id})} style={{width:42,height:42,borderRadius:11,flexShrink:0,cursor:ref.kind==='curated'?'pointer':'default'}}/>
                    <div style={{flex:1,minWidth:0}} onClick={()=>ref.kind==='curated'&&push({type:'place',id:ref.id})}>
                      <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:15,color:'#16172A',lineHeight:1.1,cursor:ref.kind==='curated'?'pointer':'default'}}>{d.name}</div>
                      <div style={{display:'flex',alignItems:'center',gap:7,marginTop:4,flexWrap:'wrap'}}>
                        <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD'}}>{d.area}</span>
                        {d.openNow&&<StatusPill openNow={d.openNow} small/>}
                      </div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:3,flexShrink:0}}>
                      <button onClick={()=>onMove(dayIndex,i,-1)} disabled={i===0} style={{width:30,height:26,borderRadius:8,border:'1px solid #E3E5F0',background:'#fff',cursor:i===0?'default':'pointer',opacity:i===0?0.4:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                      </button>

                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                      </button>
                    </div>
                    <button onClick={()=>onRemove(dayIndex,i)} style={{width:30,height:30,borderRadius:8,border:'none',background:'transparent',color:'#C0C2D4',cursor:'pointer',fontSize:18,lineHeight:1,flexShrink:0}}>×</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:700,color:'#9092AD',letterSpacing:'0.1em',textTransform:'uppercase',margin:'22px 0 10px'}}>Add to this day</div>
        {pool.length===0?(
          <div style={{background:'#F4F5FA',borderRadius:14,padding:'16px',textAlign:'center'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,color:'#6C6E8E',lineHeight:1.5}}>Everything you've saved is scheduled. Anchor a place or add to your scratchpad to plan more.</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {pool.map(({ref,d})=>(
              <div key={ref.kind+ref.id} onClick={()=>onAdd(dayIndex,ref)} style={{display:'flex',gap:11,alignItems:'center',background:'#fff',borderRadius:14,padding:'10px 12px',boxShadow:'0 1px 2px rgba(22,23,42,0.05)',cursor:'pointer'}}>

        <button style={{border:'1.5px solid #E3E5F0',background:'#fff',color:'#4E5072',fontWeight:600,fontSize:15,padding:'14px 18px',borderRadius:15,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:7}}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M9 18h6M21 3l-9 9M21 3v6h-6M3 12a9 9 0 0 0 9 9"/>
          </svg>
          Directions
        </button>
      </div>
    </div>
  );
}

  if(id==='discover') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2.6 4-4 2.6 2.6-4z"/></svg>;

const NAV=[{id:'today',label:'Today'},{id:'discover',label:'Discover'},{id:'near',label:'Near'},{id:'anchors',label:'Anchors'},{id:'search',label:'Search'}];

function BottomNav({tab,setTab}) {

      {NAV.map(t=>{
        const on=tab===t.id;
        return (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'6px 0',border:'none',background:'transparent',cursor:'pointer',color:on?'#6C5CE7':'#9092AD'}}>

          </button>
        );
      })}

}

/* ── APP ── */
function App({initialTrip,user,cloud,onLogout,onCloudSync,onSignIn}){
  const bootRaw=(initialTrip!==undefined?initialTrip:loadState());
  const [trip,setTrip]=useState(()=> bootRaw || blankTrip());
  const [editingTrip,setEditingTrip]=useState(false);
  const [onbPhase,setOnbPhase]=useState('chat'); // 'chat' | 'form' (legacy edit form)
  const [formInit,setFormInit]=useState(null);
  // New / not-yet-set-up trips land in the concierge (Search) so setup happens
  // through conversation; returning users land on Today.
  const [tab,setTab]=useState(tripNeedsSetup(bootRaw)?'search':'today');
  const [layout,setLayout]=useState('A');
  const [filter,setFilter]=useState('all');
  const [added,setAdded]=useState({});
  const [stack,setStack]=useState([]);

  // Browser-history integration so the device Back button does in-app back.
  // Push one history entry per forward nav (overlay open / tab change); a
  // popstate then unwinds that one step. pop() routes through history.back()
  // so the in-app back buttons and the device Back stay in sync.
  const histPush=()=>{ try{window.history.pushState({anchor:1},'');}catch{} };
  const push=s=>{ setStack(p=>[...p,s]); histPush(); };
  const pop=()=>{ if(typeof window!=='undefined'&&window.history) window.history.back(); else setStack(p=>p.slice(0,-1)); };
  const top=stack[stack.length-1];
  const tabHist=React.useRef([]);
  const changeTab=t=>{ const changing=(t!==tab)||stack.length>0; if(t!==tab)tabHist.current.push(tab); setTab(t); setStack([]); if(changing) histPush(); };

  const stackRef=React.useRef(stack); stackRef.current=stack;
  useEffect(()=>{
    if(typeof window==='undefined'||!window.history) return;
    window.history.pushState({anchor:1},''); // root sentinel so the first Back stays in-app
    const onPop=()=>{
      if(stackRef.current.length>0) setStack(s=>s.slice(0,-1));      // close top overlay
      else if(tabHist.current.length>0) setTab(tabHist.current.pop()); // return to previous tab
      else histPush(); // at root with nothing to unwind — re-arm so Back never leaves
    };
    window.addEventListener('popstate',onPop);
    return ()=>window.removeEventListener('popstate',onPop);
  },[]); // eslint-disable-line

  // Single commit path: local cache (instant/offline) + cloud sync (cross-device).
  const persist=nt=>{const t={...nt,updatedAt:Date.now()};saveState(t);setTrip(t);onCloudSync&&onCloudSync(t);};
  // Persist a freshly bootstrapped blank trip so a reload keeps it.
  useEffect(()=>{ if(!loadState()&&trip) saveState(trip); },[]); // eslint-disable-line
  // Apply trip setup the concierge gathered through conversation (no setup form).
  const onSetup=updates=>{
    if(!updates||typeof updates!=='object'||!Object.keys(updates).length) return;
    const t={...trip};
    if(updates.arrivalDate) t.arrivalDate=updates.arrivalDate;
    if(updates.nights) t.nights=updates.nights;
    if(t.arrivalDate&&t.nights) t.departureDate=addDays(t.arrivalDate,t.nights);
    if(Array.isArray(updates.prefs)&&updates.prefs.length) t.prefs=[...new Set([...(t.prefs||[]),...updates.prefs])];
    if(updates.hotelName||updates.hotelArea){
      const anchors=[...(t.anchors||[])];
      const name=updates.hotelName||(anchors[0]&&anchors[0].name)||'My stay';
      const area=updates.hotelArea||(anchors[0]&&anchors[0].area)||'Tokyo';
      if(anchors[0]) anchors[0]={...anchors[0],name,area};
      else anchors.unshift({id:'anc-0',name,area,checkin:t.arrivalDate||todayStr(),checkout:t.departureDate||''});
      t.anchors=anchors;
    }
    persist(t);
  };
  const handleTripComplete=t=>{persist(t);setEditingTrip(false);setOnbPhase('chat');setFormInit(null);};
  const handleAnchorPlace=id=>{
    const ap=trip?.anchoredPlaces||[];
    const newAp=ap.includes(id)?ap.filter(x=>x!==id):[...ap,id];
    persist({...trip,anchoredPlaces:newAp});
  };
  const addScratch=item=>persist({...trip,scratchpad:[...(trip.scratchpad||[]),item]});
  const anchorScratch=id=>persist({...trip,scratchpad:(trip.scratchpad||[]).map(s=>s.id===id?{...s,status:s.status==='anchored'?'idea':'anchored'}:s)});
  const removeScratch=id=>persist({...trip,scratchpad:(trip.scratchpad||[]).filter(s=>s.id!==id)});
  const scratchCount=(trip?.scratchpad||[]).length;
  // Build a scratchpad item from any place (curated or live Google result).
  const scratchItem=(p,status='idea')=>({id:'s'+Date.now()+Math.random().toString(36).slice(2,5),status,note:'',addedAt:Date.now(),sourceId:p.id,
    name:p.name,area:p.area,rating:p.rating,reviews:p.reviews,tabelogRating:p.tabelogRating,openNow:p.openNow,budget:p.budget,
    hours:p.hours,address:p.address,category:p.category||p.catLabel,googleUrl:p.googleUrl,coords:p.coords});
  // Discover swipes are atomic (single persist) and bump the swipe counter.
  const bumpT=t=>({...t,discoverSwipes:(t.discoverSwipes||0)+1});
  const discSave=p=>{
    if((trip.scratchpad||[]).some(s=>s.sourceId===p.id)){persist(bumpT(trip));return;}
    persist(bumpT({...trip,scratchpad:[...(trip.scratchpad||[]),scratchItem(p,'idea')]}));
  };
  const discAnchor=p=>{
    if(PLACES[p.id]){const ap=trip.anchoredPlaces||[];persist(bumpT({...trip,anchoredPlaces:ap.includes(p.id)?ap:[...ap,p.id]}));}
    else if((trip.scratchpad||[]).some(s=>s.sourceId===p.id)){persist(bumpT({...trip,scratchpad:(trip.scratchpad||[]).map(s=>s.sourceId===p.id?{...s,status:'anchored'}:s)}));}
    else persist(bumpT({...trip,scratchpad:[...(trip.scratchpad||[]),scratchItem(p,'anchored')]}));
  };
  const discSkip=p=>persist(bumpT({...trip,dismissedPlaces:[...(trip.dismissedPlaces||[]),p.id]}));
  const resetDismissed=()=>persist({...trip,dismissedPlaces:[]});
  // Discover "train Anchor": learned taste tags drive ranking/filtering.
  const mergeTags=(arr,add)=>[...new Set([...(arr||[]),...add.map(s=>String(s).toLowerCase().trim()).filter(Boolean)])].slice(0,40);
  const learnTaste=(addLikes,addDislikes)=>{
    const t=trip.taste||{likes:[],dislikes:[]};
    persist({...trip,taste:{likes:mergeTags(t.likes,addLikes||[]),dislikes:mergeTags(t.dislikes,addDislikes||[])}});
  };
  const removeTaste=(kind,tag)=>{
    const t=trip.taste||{likes:[],dislikes:[]};
    persist({...trip,taste:{...t,[kind]:(t[kind]||[]).filter(x=>x!==tag)}});
  };
  const likeCategory=tag=>{ if(tag) learnTaste([tag],[]); };
  // Search dislike: learn why a result is wrong (AI if available, local otherwise).
  const rejectSearch=async(place,why)=>{
    const w=(why||'').trim();
    const msg=w?`I don't like ${place.name} because ${w}`:`Not into places like ${place.name}${place.category?` (${place.category})`:''}`;
    let res=await API.refine(msg,trip.prefs||[],trip.taste||{likes:[],dislikes:[]},[]);
    if(res.error||(!(res.add_likes||[]).length&&!(res.add_dislikes||[]).length)) res=localTaste(msg);
    learnTaste(res.add_likes||[],res.add_dislikes||[]);
  };
  // Pull brand-new real Tokyo places (Google) from learned likes / prefs, into the Discover feed.
  const [optimizing,setOptimizing]=useState(false);
  const optimizeSearch=async()=>{
    if(optimizing) return 0;
    const taste=trip.taste||{likes:[],dislikes:[]};
    let terms=(taste.likes||[]).slice(0,4);
    if(!terms.length) terms=(trip.prefs||[]).map(id=>{const o=PREF_OPTS.find(x=>x.id===id);return o?o.label:id;}).slice(0,3);
    if(!terms.length) terms=['popular restaurants'];
    setOptimizing(true);
    const seen=new Set([...(trip.discovered||[]).map(p=>p.id),...(trip.scratchpad||[]).map(s=>s.sourceId).filter(Boolean),...(trip.dismissedPlaces||[])]);
    const dislikes=taste.dislikes||[];
    const found=[];
    for(const term of terms){
      const res=await API.places(term,'',5);
      (res.places||[]).forEach(p=>{
        const id='g:'+(p.googleUrl||p.name||'');
        const h=((p.name||'')+' '+(p.category||'')).toLowerCase();
        if(seen.has(id)||found.some(x=>x.id===id)) return;
        if(dislikes.some(d=>d&&h.includes(d))) return;
        found.push({...p,id,_foundFor:term});
      });
    }
    setOptimizing(false);
    persist({...trip,discovered:[...(trip.discovered||[]),...found],discoverSwipes:0});
    return found.length;
  };
  // Stash a live (Google) place into the scratchpad — status 'idea' or 'anchored'.
  const stashLive=(p,status='idea')=>addScratch({id:'s'+Date.now()+Math.random().toString(36).slice(2,5),status,note:'',addedAt:Date.now(),
    name:p.name,area:p.area,rating:p.rating,reviews:p.reviews,openNow:p.openNow,budget:p.budget,
    hours:p.hours,address:p.address,category:p.category,googleUrl:p.googleUrl,coords:p.coords});
  const saveNearby=p=>stashLive(p,'idea');
  // Remove an anchor: curated toggles off; a scratch place reverts to an idea (kept in scratchpad).
  const unanchor=ref=>{ if(ref.kind==='curated') handleAnchorPlace(ref.id); else anchorScratch(ref.id); };

  const addToDay=(dayIndex,ref)=>{
    const it={...(trip.itinerary||{})};
    const arr=Array.isArray(it[dayIndex])?[...it[dayIndex]]:[];
    if(!arr.some(r=>r.kind===ref.kind&&r.id===ref.id)) arr.push({kind:ref.kind,id:ref.id});
    it[dayIndex]=arr; persist({...trip,itinerary:it});
  };
  const removeFromDay=(dayIndex,idx)=>{
    const it={...(trip.itinerary||{})}; const arr=[...(it[dayIndex]||[])]; arr.splice(idx,1);
    it[dayIndex]=arr; persist({...trip,itinerary:it});
  };
  const moveInDay=(dayIndex,idx,dir)=>{
    const it={...(trip.itinerary||{})}; const arr=[...(it[dayIndex]||[])]; const j=idx+dir;
    if(j<0||j>=arr.length) return; [arr[idx],arr[j]]=[arr[j],arr[idx]];
    it[dayIndex]=arr; persist({...trip,itinerary:it});
  };
  const applyOptimized=(dayIndex,ordered)=>{
    const it={...(trip.itinerary||{})}; it[dayIndex]=ordered; persist({...trip,itinerary:it});
  };

  // Onboarding is now the concierge itself; the form only appears for an
  // explicit "edit trip" from the trip controls.
  if(editingTrip) return(
    <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#FAFAFD',WebkitFontSmoothing:'antialiased'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <OnboardingFlow onComplete={handleTripComplete} initialData={trip}/>
      </div>
    </div>
  );

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#FAFAFD',WebkitFontSmoothing:'antialiased'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {tab==='today'    &&<TodayScreen layout={layout} setLayout={setLayout} push={push} added={added} setAdded={setAdded} trip={trip} onEditTrip={()=>setEditingTrip(true)} goTab={changeTab}/>}
        {tab==='discover' &&<DiscoverScreen push={push} trip={trip} onSave={discSave} onAnchor={discAnchor} onSkip={discSkip} onResetDismiss={resetDismissed} onLike={likeCategory} onOptimize={optimizeSearch} optimizing={optimizing}/>}
        {tab==='near'     &&<NearScreen push={push} filter={filter} setFilter={setFilter} onSaveNear={saveNearby} trip={trip}/>}
        {tab==='anchors'  &&<AnchorsScreen push={push} trip={trip} onUnanchor={unanchor}/>}
        {tab==='search'   &&<SearchScreen push={push} onStash={stashLive} trip={trip} onLearn={learnTaste} onSetup={onSetup}/>}

        {top&&top.type==='place'  &&<PlaceDetailOverlay key={top.id} id={top.id} pop={pop} push={push} trip={trip} onAnchorPlace={handleAnchorPlace} onAddToDay={addToDay}/>}
        {top&&top.type==='anchor' &&<AnchorDetailOverlay key={top.anchorId} anchorId={top.anchorId} pop={pop} push={push} trip={trip}/>}
        {top&&top.type==='trip'   &&<TripOverlay pop={pop} push={push} trip={trip} user={user} cloud={cloud} onLogout={onLogout} onSignIn={onSignIn}/>}
        {top&&top.type==='scratch'&&<ScratchpadOverlay pop={pop} trip={trip} onAdd={addScratch} onAnchor={anchorScratch} onRemove={removeScratch}/>}
        {top&&top.type==='discoverchat'&&<DiscoverChatOverlay pop={pop} trip={trip} onLearn={learnTaste} onRemoveTaste={removeTaste} onOptimize={optimizeSearch} optimizing={optimizing}/>}
        {top&&top.type==='day'    &&<DayPlanOverlay key={top.dayIndex} dayIndex={top.dayIndex} pop={pop} push={push} trip={trip} onAdd={addToDay} onRemove={removeFromDay} onMove={moveInDay} onOptimized={applyOptimized}/>}

        {stack.length===0&&tab!=='search'&&(
          <button onClick={()=>push({type:'scratch'})} aria-label="Scratchpad" style={{position:'absolute',right:16,bottom:'calc(18px + env(safe-area-inset-bottom) + var(--safari-inset))',zIndex:25,width:56,height:56,borderRadius:18,border:'none',background:'linear-gradient(135deg,#FB7242,#F857A6)',boxShadow:'0 8px 22px rgba(251,114,66,0.45)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            {scratchCount>0&&<span style={{position:'absolute',top:-4,right:-4,minWidth:20,height:20,padding:'0 5px',borderRadius:999,background:'#16172A',color:'#fff',fontFamily:"'Geist Mono',monospace",fontSize:11,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid #FAFAFD'}}>{scratchCount}</span>}
          </button>
        )}
      </div>
      {stack.length===0&&<BottomNav tab={tab} setTab={changeTab}/>}
    </div>
  );
}

/* ── AUTH: email-passcode sign in ── */
function LoginScreen({onAuthed,onSkip}){
  const [step,setStep]=useState('email'); // 'email' | 'code'
  const [email,setEmail]=useState('');
  const [code,setCode]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [note,setNote]=useState(''); // dev/info note
  const sendCode=async()=>{
    const e=email.trim().toLowerCase(); setErr('');
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){setErr('Enter a valid email address.');return;}
    setBusy(true); const r=await API.requestCode(e); setBusy(false);
    if(r.error||r.status>=400){setErr(r.message||'Could not send a code. Try again.');return;}
    setStep('code'); setNote(r.devCode?`Dev mode — your code is ${r.devCode}`:(r.sent?`Code sent to ${e}`:(r.message||'')));
  };
  const verify=async()=>{
    const c=code.trim(); setErr('');
    if(!/^\d{6}$/.test(c)){setErr('Enter the 6-digit code.');return;}
    setBusy(true); const r=await API.verifyCode(email.trim().toLowerCase(),c); setBusy(false);
    if(r.user){onAuthed(r.user);return;}
    setErr(r.message||'Incorrect code.');
  };
  const onKey=(e,fn)=>{if(e.key==='Enter')fn();};
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',background:'#FAFAFD',padding:'0 26px',WebkitFontSmoothing:'antialiased'}}>
      <div style={{maxWidth:380,width:'100%',margin:'0 auto'}}>
        <div style={{width:54,height:54,borderRadius:16,background:'linear-gradient(135deg,#FB7242,#F857A6)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20,boxShadow:'0 8px 22px rgba(251,114,66,0.35)'}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="3"/><path d="M12 8v13M5 12H2a10 10 0 0 0 20 0h-3"/></svg>
        </div>
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:26,color:'#16172A',lineHeight:1.15}}>{step==='email'?'Sign in to Anchor':'Check your email'}</div>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14.5,color:'#6C6E8E',marginTop:7,lineHeight:1.5}}>
          {step==='email'?'Your trips, anchors and scratchpad save to your account — on any device.':`Enter the 6-digit code we sent to ${email.trim().toLowerCase()}.`}
        </div>
        <div style={{marginTop:22}}>
          {step==='email'?(
            <input autoFocus type="email" inputMode="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>onKey(e,sendCode)} placeholder="you@email.com"
              style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:13,padding:'14px 15px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:16,color:'#16172A',outline:'none',boxSizing:'border-box'}}/>
          ):(
            <input autoFocus inputMode="numeric" maxLength={6} value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,''))} onKeyDown={e=>onKey(e,verify)} placeholder="123456"
              style={{width:'100%',border:'1.5px solid #E3E5F0',borderRadius:13,padding:'14px 15px',fontFamily:"'Geist Mono',monospace",fontSize:22,letterSpacing:'8px',textAlign:'center',color:'#16172A',outline:'none',boxSizing:'border-box'}}/>
          )}
          {err&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#D8553C',marginTop:9}}>{err}</div>}
          {note&&!err&&<div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#0E865B',marginTop:9}}>{note}</div>}
          <button disabled={busy} onClick={step==='email'?sendCode:verify}
            style={{width:'100%',marginTop:14,border:'none',borderRadius:13,background:busy?'#B6A9F2':'#6C5CE7',color:'#fff',fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:16,padding:'14px',cursor:busy?'default':'pointer',boxShadow:'0 6px 18px rgba(108,92,231,0.28)'}}>
            {busy?'…':(step==='email'?'Send code':'Verify & sign in')}</button>
          {step==='code'&&<button onClick={()=>{setStep('email');setCode('');setErr('');setNote('');}} style={{width:'100%',marginTop:10,border:'none',background:'none',color:'#9092AD',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,cursor:'pointer'}}>← Use a different email</button>}
          {step==='email'&&onSkip&&<button onClick={onSkip} style={{width:'100%',marginTop:12,border:'none',background:'none',color:'#9092AD',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13.5,cursor:'pointer'}}>Continue without an account →</button>}
        </div>
      </div>
    </div>
  );
}

function Splash(){
  return <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'#FAFAFD'}}>
    <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD'}}>Loading Anchor…</div></div>;
}

// Root: resolves auth + the source-of-truth trip before mounting the app.
// Fails open — if the backend has no DB bound, runs offline (localStorage only)
// exactly like before, so the app is never bricked pre-provisioning.
function Root(){
  const [phase,setPhase]=useState('loading'); // 'loading' | 'login' | 'app'
  const [user,setUser]=useState(null);
  const [cloud,setCloud]=useState(false);
  const [initialTrip,setInitialTrip]=useState(undefined);
  const syncTimer=React.useRef(null);

  // Sign-in trip resolution. NEVER destroy local data: keep whichever copy is
  // newer by updatedAt, and on a tie or legacy/un-timestamped local, KEEP LOCAL
  // (the device is the copy the user has been editing). Push the kept copy up so
  // cloud converges. This makes an empty/stale cloud record harmless.
  const enterWithTrip=async(u)=>{
    const res=await API.tripGet();
    const local=loadState();
    const cloud=(res&&res.trip&&typeof res.trip==='object')?res.trip:null;
    const cloudT=cloud?(Number(res.updated_at)||Number(cloud.updatedAt)||0):0;
    const localT=local?(Number(local.updatedAt)||0):0;
    const useCloud=cloud&&cloudT>localT;             // local wins ties + legacy (localT=0)
    const chosen=useCloud?cloud:(local||cloud||null);
    if(chosen){ saveState(chosen); setInitialTrip(chosen); }
    else { setInitialTrip(null); }
    if(chosen&&!useCloud) API.tripPut(chosen);        // converge cloud to the kept copy
    setUser(u); setCloud(true); setPhase('app');
  };

  // Re-show login on demand (from Settings); escape hatch back to local data.
  const onSignIn=()=>setPhase('login');
  const onSkipLogin=()=>{ setInitialTrip(loadState()); setCloud(true); setPhase('app'); };

  useEffect(()=>{(async()=>{
    const r=await API.me();
    const local=loadState();
    if(!r.cloud){ setCloud(false); setInitialTrip(local); setPhase('app'); return; } // offline-only
    if(r.user){ await enterWithTrip(r.user); return; }
    // Cloud configured but nobody signed in. NEVER wall existing local data behind
    // login — enter with it; sign-in stays available in Settings. Only a brand-new
    // device (no local trip) sees the login screen.
    if(local){ setCloud(true); setInitialTrip(local); setPhase('app'); }
    else { setCloud(true); setPhase('login'); }
  })();},[]); // eslint-disable-line

  // Debounced cloud save (only when signed in).
  const onCloudSync=React.useCallback(nt=>{
    clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(()=>{API.tripPut(nt);},800);
  },[]);

  const onLogout=async()=>{ await API.logout(); setUser(null); setInitialTrip(undefined); setPhase('login'); };

  if(phase==='loading') return <Splash/>;
  if(phase==='login') return <LoginScreen onAuthed={enterWithTrip} onSkip={onSkipLogin}/>;
  return <App key={user?user.email:'offline'} initialTrip={initialTrip} user={user} cloud={cloud}
    onCloudSync={cloud&&user?onCloudSync:null} onLogout={cloud&&user?onLogout:null} onSignIn={cloud&&!user?onSignIn:null}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
