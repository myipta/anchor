<link rel="preconnect" href="https://fonts.googleapis.com">

*{scrollbar-width:none;-ms-overflow-style:none}

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

/* ── DATA ── */
const CATS = {
  art:    {label:'Art',          grad:'linear-gradient(135deg,#A98BFF,#F857A6)'},
  food:   {label:'Food',         grad:'linear-gradient(135deg,#FF9E5E,#F857A6)'},
  culture:{label:'Culture',      grad:'linear-gradient(135deg,#FFB36B,#FB7242)'},
  views:  {label:'Views',        grad:'linear-gradient(135deg,#8B72FB,#FF8FC0)'},
  nature: {label:'Nature',       grad:'linear-gradient(135deg,#5BD6B0,#8B72FB)'},
  nbhd:   {label:'Neighborhood', grad:'linear-gradient(135deg,#FF8FC0,#A98BFF)'},
  coffee: {label:'Coffee',       grad:'linear-gradient(135deg,#FFC59E,#FB7242)'},
  stay:   {label:'Stay',         grad:'linear-gradient(135deg,#9AA0FF,#6C5CE7)'},
};

const PLACES = {
  senso:{name:'Sensō-ji Temple',cat:'culture',area:'Asakusa',rating:4.7,tabelogRating:null,mins:60,
    coords:'35.7148, 139.7967',hours:'6:00 – 17:00',openNow:'open',budget:'Free',station:'Asakusa (5 min)',
    note:'Enter through Nakamise street — grab a melonpan and ningyo-yaki on the walk in.',
    digest:'Tokyo\'s most visited temple feels genuinely ancient in the early morning. Locals visit for New Year\'s; the Nakamise arcade is tourist-heavy but the inner grounds stay serene.'},
  blue:{name:'Blue Bottle Kiyosumi',cat:'coffee',area:'Kiyosumi',rating:4.4,tabelogRating:3.5,mins:30,
    coords:'35.6816, 139.8005',hours:'8:00 – 19:00',openNow:'open',budget:'¥',station:'Kiyosumi-Shirakawa (4 min)',
    reason:'You start mornings slow — a quiet pour-over before the day\'s first anchor is exactly your pace.',
    digest:'The Kiyosumi flagship is quieter than the Shibuya branch. Long communal tables, minimal soundtrack, staff who know the menu cold. Order the single-origin pour-over.'},
  tsukiji:{name:'Tsukiji Outer Market',cat:'food',area:'Tsukiji',rating:4.5,tabelogRating:null,mins:75,
    coords:'35.6654, 139.7707',hours:'5:00 – 14:00',openNow:'soon',budget:'¥¥',station:'Tsukiji (3 min)',
    note:'Tamagoyaki on a stick, then uni at the counter. Many stalls are cash-only.',
    digest:'The outer market survived the inner market\'s move to Toyosu. Tamagoyaki shops along the main lane are the draw; tuna stalls open from 5 AM for the true early crowd.'},
  teamlab:{name:'teamLab Planets',cat:'art',area:'Toyosu',rating:4.8,tabelogRating:null,mins:90,
    coords:'35.6297, 139.7756',hours:'10:00 – 22:00',openNow:'open',budget:'¥¥¥',station:'Shin-Toyosu (3 min)',
    note:'Booked 10:00 entry — go early, before the midday crowds build.',
    digest:'Four rooms of immersive digital art. The water room requires bare feet and gets crowded by noon. Printed-ticket holders move through faster than app-ticket holders.'},
  sky:{name:'Shibuya Sky',cat:'views',area:'Shibuya',rating:4.9,tabelogRating:null,mins:60,
    coords:'35.6580, 139.7016',hours:'10:00 – 22:30',openNow:'open',budget:'¥¥',station:'Shibuya (3 min)',
    note:'You booked the sunset slot — arrive 30 min early for the open-air rooftop edge.',
    digest:'Open-air deck on top of Scramble Square at 229m. No glass barrier on the roof level — just wire mesh. Sunset slots sell out weeks ahead.'},
  ichiran:{name:'Ichiran Shibuya',cat:'food',area:'Shibuya',rating:4.6,tabelogRating:3.8,mins:45,
    coords:'35.6618, 139.7041',hours:'Open 24 hours',openNow:'open',budget:'¥',station:'Shibuya (5 min)',
    note:'Solo ramen booths — tick the order sheet, no small talk required.',
    digest:'The original solo-booth ramen experience. Each seat is a private compartment with a bamboo blind; you communicate via paper order form. Tonkotsu broth is consistent; the experience is the point.'},
  shimo:{name:'Shimokitazawa',cat:'nbhd',area:'Setagaya',rating:4.6,tabelogRating:null,mins:120,
    coords:'35.6613, 139.6680',hours:'Shops ~11:00 – 20:00',openNow:'open',budget:'¥',station:'Shimokitazawa (0 min)',
    note:'Vintage racks and six-seat coffee bars. Easy to lose a whole afternoon here.',
    digest:'Tokyo\'s indie arts neighborhood. Vintage stores stack three floors. Live music venues are in basements. Best explored without a plan — follow the narrowest lane.'},
  nezu:{name:'Nezu Museum',cat:'art',area:'Aoyama',rating:4.5,tabelogRating:null,mins:60,
    coords:'35.6627, 139.7176',hours:'10:00 – 17:00',openNow:'closed',budget:'¥¥',station:'Omotesando (8 min)',
    reason:'You linger in hushed, low-lit galleries. Nezu\'s garden empties out by late afternoon — go then.',
    digest:'A quietly exceptional private collection — Buddhist sculpture, lacquerware, Chinese bronzes — in Kengo Kuma\'s bamboo-lattice building. The café terrace by the garden is underrated.'},
  yoyogi:{name:'Yoyogi Park',cat:'nature',area:'Harajuku',rating:4.6,tabelogRating:null,mins:45,
    coords:'35.6720, 139.6949',hours:'Always open',openNow:'open',budget:'Free',station:'Harajuku (1 min)',
    reason:'You build a slow hour into every afternoon. This is where Tokyo actually exhales.',
    digest:'The park Tokyoites actually use — picnics, musicians, a dog run, scattered shade groves. Connects directly to Meiji Shrine. Sunday afternoons bring cosplay gatherings near the main entrance.'},
  omoide:{name:'Omoide Yokocho',cat:'food',area:'Shinjuku',rating:4.4,tabelogRating:3.6,mins:60,
    coords:'35.6938, 139.6995',hours:'17:00 – late',openNow:'soon',budget:'¥¥',station:'Shinjuku (2 min)',
    reason:'You linger over counter seats — this whole alley is six-stool bars, charcoal smoke and offcuts.',
    digest:'Memory Lane: a survival-era alley of tiny yakitori stalls directly behind Shinjuku station\'s west exit. Each bar seats six at most. Chicken hearts, livers, skin; cheap beer is the mandate.'},
  about:{name:'About Life Coffee',cat:'coffee',area:'Dogenzaka',rating:4.5,tabelogRating:3.4,mins:20,
    coords:'35.6585, 139.6979',hours:'9:00 – 19:00',openNow:'soon',budget:'¥',station:'Shibuya (5 min)',
    note:'Stand-up window espresso — a Shibuya morning institution.',
    digest:'A window-hatch espresso counter in a narrow Dogenzaka lane. You order standing; a few stools available. Known for rotating single-origin espresso and a generous extraction.'},
  gyukatsu:{name:'Gyukatsu Motomura',cat:'food',area:'Shibuya',rating:4.5,tabelogRating:3.7,mins:40,
    coords:'35.6595, 139.6982',hours:'11:00 – 22:00',openNow:'open',budget:'¥¥',station:'Shibuya (4 min)',
    note:'Grill your own beef cutlet on a tabletop stone. Lunch queues move fast.',
    digest:'The Motomura chain runs the beef-katsu grilling concept cleanly: medium-rare slices arrive with a hot stone; you finish cooking at the table. The lunch set is the move.'},
  nonbei:{name:'Nonbei Yokocho',cat:'nbhd',area:'Shibuya',rating:4.6,tabelogRating:null,mins:60,
    coords:'35.6597, 139.7016',hours:'18:00 – late',openNow:'closed',budget:'¥¥',station:'Shibuya (6 min)',
    note:'Postage-stamp bars tucked under the train tracks. Pick one with an open stool.',
    digest:'A shorter, quieter alley than Memory Lane — more cocktail bars, slightly younger crowd. Bars here are genuinely tiny. Best after 8 PM when they fill in.'},
  fuglen:{name:'Fuglen Tokyo',cat:'coffee',area:'Tomigaya',rating:4.5,tabelogRating:3.5,mins:30,
    coords:'35.6678, 139.6905',hours:'9:00 – 22:00',openNow:'open',budget:'¥',station:'Yoyogi-Koen (5 min)',
    note:'Norwegian roasts by day, cocktails by night.',
    digest:'The Tokyo outpost of the Oslo original. Mid-century chairs, long opening hours. The flat white is excellent; the cocktail menu after 5 PM draws a neighborhood crowd who treat it as a local bar.'},
};

const ANCHOR_IDS = ['senso','ichiran','sky','tsukiji','teamlab','shimo'];

const PAIRS = {
  senso:['blue','omoide'],tsukiji:['blue','gyukatsu'],omoide:['nonbei','fuglen'],
  blue:['nezu','tsukiji'],nezu:['blue','yoyogi'],yoyogi:['about','shimo'],
  sky:['ichiran','nonbei'],ichiran:['nonbei','sky'],teamlab:['blue','tsukiji'],
  shimo:['fuglen','about'],about:['gyukatsu','nonbei'],gyukatsu:['nonbei','ichiran'],
  nonbei:['gyukatsu','sky'],fuglen:['shimo','about'],
};

const ANCHORS_DATA = [
  {id:'park-hyatt',name:'Park Hyatt Tokyo',area:'Shinjuku',dates:'Jun 14–16',nights:2,
    categories:[
      {id:'coffee',name:'Coffee',placeIds:['about','fuglen','blue']},
      {id:'food',name:'Food & Drink',placeIds:['ichiran','gyukatsu','omoide','nonbei']},
      {id:'sights',name:'Sights',placeIds:['sky','shimo','yoyogi']},
    ]},
  {id:'cerulean',name:'Cerulean Tower Tokyu',area:'Shibuya',dates:'Jun 16–18',nights:2,
    categories:[
      {id:'culture',name:'Culture & Art',placeIds:['senso','teamlab','nezu']},
      {id:'food',name:'Food & Markets',placeIds:['tsukiji','gyukatsu','omoide']},
      {id:'coffee',name:'Coffee',placeIds:['blue','about']},
    ]},
];

const TRIP = {
  name:'Tokyo',year:'June 2026',
  flights:[
    {dir:'arrive',label:'JL061  SFO → NRT',time:'Sat Jun 14 · 5:20 PM'},
    {dir:'depart',label:'JL060  NRT → SFO',time:'Wed Jun 18 · 11:30 AM'},
  ],
  days:[
    {date:'Sat Jun 14',label:'Day 1',hotel:'Park Hyatt',placeIds:['sky','ichiran']},
    {date:'Sun Jun 15',label:'Day 2',hotel:'Park Hyatt',placeIds:['senso','blue','tsukiji'],active:true},
    {date:'Mon Jun 16',label:'Day 3',hotel:'Cerulean',placeIds:['teamlab','nonbei']},
    {date:'Tue Jun 17',label:'Day 4',hotel:'Cerulean',placeIds:['shimo','fuglen','nezu']},
  ],
};

function bp(id) {
  const p=PLACES[id], c=CATS[p.cat]||CATS.nbhd;
  return {id,catLabel:c.label,catGrad:c.grad,...p};
}

function sc(openNow) {
  if(openNow==='open')  return {dot:'#14A06E',ink:'#0E865B',soft:'#D6F5E6',label:'Open now'};
  if(openNow==='soon')  return {dot:'#ECA800',ink:'#C98A00',soft:'#FCEFCF',label:'Closing soon'};
  return                       {dot:'#9092AD',ink:'#6C6E8E',soft:'#ECEDF6',label:'Closed'};
}

/* ── ICONS ── */
const AnchorIco = ({size=14,color='#FB7242'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
    <path d="M12 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM12 8v14M5 12H2a10 10 0 0 0 20 0h-3"/>
  </svg>
);
const StarIco = ({size=13,color='#ECA800'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
    <path d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4l1.5-6.8L2.2 9l6.9-.7z"/>
  </svg>
);
const SparkleIco = ({size=17,color='#fff'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
    <path d="M12 2l1.6 4.9a2 2 0 0 0 1.3 1.3L20 9.8l-4 3a2 2 0 0 0-.7 2.1L17 20l-4.4-2.8a2 2 0 0 0-2.2 0L6 20l1.7-5.1A2 2 0 0 0 7 12.8l-4-3 5.1-1.6A2 2 0 0 0 9.4 6.9Z"/>
  </svg>
);
const WalkIco = ({size=12,color='#B6B8CC'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="13" cy="4" r="1.6" fill={color} stroke="none"/>
    <path d="M11 7l-2 4 3 2 1 5M9 11l-3 1-1 4M13 13l3 1"/>
  </svg>
);
const ChevRight = ({size=18,color='#C0C2D4'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="m9 18 6-6-6-6"/>
  </svg>
);
const BackBtn = ({onClick}) => (
  <button onClick={onClick} style={{width:38,height:38,borderRadius:'50%',border:'none',background:'#F1EEFF',
    display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#232540" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="m15 18-6-6 6-6"/>
    </svg>
  </button>
);

/* ── ATOMS ── */
function StatusPill({openNow,small}) {
  const s=sc(openNow);
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,fontFamily:"'Hanken Grotesk',sans-serif",
      fontWeight:600,fontSize:small?11:12,color:s.ink,background:s.soft,
      padding:small?'2px 7px':'3px 9px',borderRadius:999,whiteSpace:'nowrap'}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:s.dot,flexShrink:0}}/>
      {s.label}
    </span>
  );
}

function Ratings({rating,tabelogRating,size='sm'}) {
  const fs=size==='sm'?12:13, st=size==='sm'?13:14;
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
      <span style={{display:'inline-flex',alignItems:'center',gap:3}}>
        <StarIco size={st}/>
        <span style={{fontFamily:"'Geist Mono',monospace",fontSize:fs,color:'#353756'}}>{rating}</span>
      </span>
      {tabelogRating&&(
        <span style={{display:'inline-flex',alignItems:'center',gap:4,fontFamily:"'Geist Mono',monospace",
          fontSize:fs,color:'#4836B4',background:'#F1EEFF',padding:'2px 7px',borderRadius:6}}>
          <span style={{fontSize:fs-1,fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700}}>食</span>
          {tabelogRating}
        </span>
      )}
    </span>
  );
}

const BudgetBadge = ({budget}) => budget ? (
  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:'#6C6E8E',
    background:'#ECEDF6',padding:'2px 7px',borderRadius:6}}>{budget}</span>
) : null;

/* ── MAP ── */
function AnchorMap({pins=[],connect=true,height='100%'}) {
  const route=pins.filter(p=>p.kind!=='you').map(p=>`${p.x},${p.y}`).join(' ');
  return (
    <div style={{position:'relative',width:'100%',height,overflow:'hidden',background:'#E9EBF3'}}>
      <svg viewBox="0 0 390 360" preserveAspectRatio="xMidYMid slice"
        style={{position:'absolute',inset:0,width:'100%',height:'100%',display:'block'}}>
        <rect width="390" height="360" fill="#E9EBF3"/>
        <path d="M250 360 C265 300 320 286 390 292 L390 360 Z" fill="#CFE3EE"/>
        <path d="M-20 120 C70 150 120 210 210 250 C275 279 320 300 360 360 L335 360 C300 312 250 292 195 268 C110 230 60 178 -20 152 Z" fill="#CFE3EE" opacity=".85"/>
        <rect x="36" y="46" width="78" height="58" rx="14" fill="#D8ECDB"/>
        <rect x="292" y="120" width="74" height="64" rx="16" fill="#D8ECDB"/>
        <g fill="#F4F5FA">
          {[[132,36,60,44],[200,30,52,40],[262,40,58,50],[40,120,56,48],[104,116,46,40],
            [158,96,62,46],[228,96,48,42],[40,186,62,52],[112,176,52,46],[248,170,56,44],
            [316,206,52,48],[44,262,58,50],[116,246,48,42],[232,248,46,40]].map(([x,y,w,h],i)=>(
            <rect key={i} x={x} y={y} width={w} height={h} rx="7"/>
          ))}
        </g>
        <g fill="#EAEBF4">
          <rect x="196" y="78" width="26" height="58" rx="6"/>
          <rect x="100" y="60" width="26" height="50" rx="6"/>
          <rect x="300" y="100" width="22" height="92" rx="6"/>
          <rect x="170" y="160" width="68" height="22" rx="6"/>
        </g>
        <g stroke="#fff" strokeLinecap="round" fill="none">
          <path d="M0 92 L390 70" strokeWidth="6"/>
          <path d="M0 160 L300 150 L390 196" strokeWidth="6"/>
          <path d="M30 0 L70 360" strokeWidth="5"/>
          <path d="M150 0 L196 300" strokeWidth="5"/>
          <path d="M250 0 L300 250" strokeWidth="5"/>
          <path d="M0 240 L240 240" strokeWidth="4" opacity=".8"/>
        </g>
      </svg>
      {connect&&route&&(
        <svg viewBox="0 0 100 100" preserveAspectRatio="none"
          style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
          <polyline points={route} fill="none" stroke="#8B72FB" strokeWidth="2.5"
            strokeDasharray="1.5 3" strokeLinecap="round" strokeLinejoin="round"
            vectorEffect="non-scaling-stroke" opacity=".9"/>
        </svg>
      )}
      {pins.map((pin,i)=>{
        const isYou=pin.kind==='you',isAnc=pin.kind==='anchor';
        const color=isAnc?'#FB7242':'#6C5CE7';
        const big=pin.big,w=big?38:30,h=big?48:38;
        return (
          <div key={pin.id||i} style={{position:'absolute',left:pin.x+'%',top:pin.y+'%',
            transform:'translate(-50%,-100%)',zIndex:big?30:isAnc?20:12}}>
            {isYou?(
              <div style={{transform:'translateY(50%)'}}>
                <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
                  width:34,height:34,borderRadius:'50%',background:'rgba(108,92,231,0.18)'}}/>
                <div style={{position:'relative',width:18,height:18,borderRadius:'50%',
                  background:'#6C5CE7',border:'3px solid #fff',boxShadow:'0 2px 6px rgba(108,92,231,0.45)'}}/>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',
                filter:`drop-shadow(0 6px 10px ${isAnc?'rgba(251,114,66,0.45)':'rgba(108,92,231,0.40)'})`}}>
                {big&&pin.label&&<div style={{marginBottom:6,background:'#fff',color:'#16172A',
                  fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:12,whiteSpace:'nowrap',
                  padding:'6px 9px',borderRadius:999,boxShadow:'0 2px 8px rgba(22,23,42,0.16)'}}>{pin.label}</div>}
                <svg width={w} height={h} viewBox="0 0 30 38">
                  <path d="M15 0 C6.7 0 0 6.7 0 15 C0 26 12 33 15 38 C18 33 30 26 30 15 C30 6.7 23.3 0 15 0 Z" fill={color}/>
                  <circle cx="15" cy="14.5" r="9.5" fill="#fff"/>
                  <text x="15" y="15" textAnchor="middle" dominantBaseline="central"
                    fontFamily="'Schibsted Grotesk',sans-serif" fontWeight="700" fontSize="13" fill={color}>{pin.num??i+1}</text>
                </svg>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ── TIMELINE ── */
function Timeline({stops,onOpen,onAdd,onSkip}) {
  return (
    <div style={{display:'flex',flexDirection:'column',padding:'4px 18px 8px'}}>
      {stops.map((s)=>{
        const isAnc=s.kind==='anchor';
        const nodeBg=isAnc?'#FB7242':s.added?'#6C5CE7':'#F1EEFF';
        const nodeInk=isAnc?'#fff':s.added?'#fff':'#6C5CE7';
        const nodeBorder=isAnc?'none':s.added?'none':'2px dashed #A793FF';
        return (
          <div key={s.id} style={{display:'flex',gap:14,alignItems:'stretch'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:34,flexShrink:0}}>
              <div style={{width:34,height:34,borderRadius:'50%',background:nodeBg,border:nodeBorder,color:nodeInk,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:15,
                boxShadow:isAnc?'0 4px 10px rgba(251,114,66,0.35)':s.added?'0 4px 10px rgba(108,92,231,0.30)':'none',
                zIndex:2}}>{s.num}</div>
              {s.hasLine&&<div style={{flex:1,width:2,background:'repeating-linear-gradient(#D5D6E4 0 5px,transparent 5px 10px)',margin:'4px 0'}}/>}
            </div>
            <div style={{flex:1,paddingBottom:s.travel?'4px':'22px'}}>
              <div style={{fontFamily:"'Geist Mono',monospace",fontSize:12,fontWeight:500,color:'#6C6E8E',letterSpacing:'0.02em',margin:'6px 0'}}>{s.time}</div>
              {isAnc?(
                <div onClick={()=>onOpen&&onOpen(s.id)} style={{background:'#fff',borderRadius:20,
                  boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 6px 16px rgba(22,23,42,0.07)',overflow:'hidden',cursor:'pointer'}}>
                  <div style={{display:'flex',gap:12,padding:'13px 14px'}}>
                    <div style={{width:52,height:52,borderRadius:14,flexShrink:0,background:s.catGrad,
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22Z"/><circle cx="12" cy="10" r="3"/>
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                        <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#FFE2D4',color:'#ED5A2A',
                          fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,fontSize:11,letterSpacing:'0.04em',
                          textTransform:'uppercase',padding:'3px 8px',borderRadius:999}}>
                          <AnchorIco size={11} color="#ED5A2A"/> Anchor
                        </span>

/* ── SEARCH ── */
function SearchScreen({push}) {
  const [q,setQ]=useState('');
  const allPlaces=Object.keys(PLACES).map(bp);
  const results=q.length<2?[]:allPlaces.filter(p=>{
    const s=(p.name+p.area+p.catLabel+(p.note||'')+(p.reason||'')+(p.digest||'')).toLowerCase();
    return s.includes(q.toLowerCase());
  }).map(p=>{
    const qLow=q.toLowerCase();
    let why='';
    if(p.name.toLowerCase().includes(qLow)) why='Name match';
    else if(p.catLabel.toLowerCase().includes(qLow)) why=`Category: ${p.catLabel}`;
    else if(p.area.toLowerCase().includes(qLow)) why=`Neighborhood: ${p.area}`;
    else {
      const text=p.note||p.reason||p.digest||'';
      const idx=text.toLowerCase().indexOf(qLow);
      if(idx>-1) {
        const snip=text.slice(Math.max(0,idx-15),idx+50).trim();
        why=`"…${snip}…"`;
      }
    }
    return {...p,why};
  });
  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
      <div style={{flexShrink:0,padding:'16px 18px 12px',background:'#FAFAFD',borderBottom:'1px solid #ECEDF6'}}>
        <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#9092AD',marginBottom:10}}>Search saved</div>
        <div style={{position:'relative'}}>
          <svg style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}
            width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9092AD" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Place, neighborhood, dish, note…"
            style={{width:'100%',border:'1.5px solid #E3E5F0',background:'#fff',borderRadius:14,padding:'12px 40px 12px 42px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#16172A',outline:'none'}}/>
          {q&&<button onClick={()=>setQ('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',border:'none',background:'none',color:'#9092AD',fontSize:20,lineHeight:1,padding:2}}>×</button>}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {q.length<2&&(
          <div style={{padding:'40px 24px',textAlign:'center'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD',lineHeight:1.6}}>Search by name, neighborhood, category, or what a place is known for.</div>
          </div>
        )}
        {q.length>=2&&results.length===0&&(
          <div style={{padding:'40px 24px',textAlign:'center'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:15,color:'#9092AD'}}>No saved places match "{q}"</div>
          </div>
        )}
        {results.length>0&&(
          <div style={{padding:'10px 18px 24px'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,color:'#9092AD',marginBottom:10}}>{results.length} {results.length===1?'match':'matches'}</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {results.map(p=>(
                <div key={p.id} onClick={()=>push({type:'place',id:p.id})} style={{background:'#fff',borderRadius:20,padding:'13px 14px',boxShadow:'0 1px 2px rgba(22,23,42,0.06),0 6px 16px rgba(22,23,42,0.06)',cursor:'pointer'}}>

                    </div>

                  {p.why&&(

          <div style={{marginTop:12,background:'#F4F5FA',borderRadius:18,padding:'14px 15px'}}>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'#6C5CE7',marginBottom:8}}>What locals say</div>
            <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#353756',lineHeight:1.55}}>{d.digest}</div>
          </div>
        )}

        {/* Map mini */}
        <div style={{marginTop:14,borderRadius:18,overflow:'hidden',height:128,boxShadow:'inset 0 0 0 1px #E7E8F1'}}>
          <AnchorMap pins={detailPins} connect={false} height="128px"/>
        </div>

        {/* Notes */}
        <div style={{marginTop:16}}>
          <div style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'#9092AD',marginBottom:8}}>Your notes</div>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Add a note…"
            style={{width:'100%',border:'1.5px solid #E3E5F0',background:'#fff',borderRadius:14,padding:'12px 14px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:14,color:'#353756',outline:'none',resize:'none',lineHeight:1.5,minHeight:78}}/>
        </div>

        {/* Nearby */}
        <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:700,fontSize:15,color:'#16172A',margin:'18px 0 10px'}}>Fits nearby</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:100}}>
          {pairs.map(p=>(
            <div key={p.id} onClick={()=>push({type:'place',id:p.id})} style={{display:'flex',alignItems:'center',gap:12,background:'#fff',borderRadius:16,padding:'10px 12px',boxShadow:'0 1px 2px rgba(22,23,42,0.05)',cursor:'pointer'}}>
              <div style={{width:46,height:46,borderRadius:12,flexShrink:0,background:p.catGrad}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Schibsted Grotesk',sans-serif",fontWeight:600,fontSize:15,color:'#16172A',lineHeight:1.1}}>{p.name}</div>
                <div style={{display:'flex',alignItems:'center',gap:7,marginTop:4,flexWrap:'wrap'}}>
                  <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontSize:12,color:'#9092AD'}}>{p.catLabel} · {p.area}</span>
                  <StatusPill openNow={p.openNow} small/>
                </div>
              </div>
              <ChevRight/>
            </div>
          ))}
        </div>
      </div>

      <div style={{position:'sticky',bottom:0,display:'flex',gap:10,padding:'12px 18px 28px',background:'linear-gradient(180deg,rgba(250,250,253,0) 0%,#FAFAFD 28%)'}}>
        <button style={{flex:1,border:'none',background:'#6C5CE7',color:'#fff',fontWeight:600,fontSize:15,padding:14,borderRadius:15,cursor:'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,boxShadow:'0 6px 18px rgba(108,92,231,0.30)'}}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          {isAnc?'Anchored':'Anchor it'}
        </button>
        <button style={{border:'1.5px solid #E3E5F0',background:'#fff',color:'#4E5072',fontWeight:600,fontSize:15,padding:'14px 18px',borderRadius:15,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:7}}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#4E5072" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M9 18h6M21 3l-9 9M21 3v6h-6M3 12a9 9 0 0 0 9 9"/>
          </svg>
          Directions
        </button>
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ── */
function TabIco({id,on}) {
  const c=on?'#6C5CE7':'#9092AD';
  if(id==='today') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>;
  if(id==='discover') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2.6 4-4 2.6 2.6-4z"/></svg>;
  if(id==='near') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>;
  if(id==='anchors') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="2.4"/><path d="M12 7.4V21M6 13H4a8 8 0 0 0 16 0h-2M8.5 18.5 12 21l3.5-2.5"/></svg>;
  if(id==='search') return <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
  return null;
}

const NAV=[{id:'today',label:'Today'},{id:'discover',label:'Discover'},{id:'near',label:'Near'},{id:'anchors',label:'Anchors'},{id:'search',label:'Search'}];

function BottomNav({tab,setTab}) {
  return (
    <div style={{flexShrink:0,display:'flex',padding:'8px 2px 20px',background:'rgba(255,255,255,0.86)',backdropFilter:'blur(18px)',borderTop:'1px solid #ECEDF6',zIndex:20}}>
      {NAV.map(t=>{
        const on=tab===t.id;
        return (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'6px 0',border:'none',background:'transparent',cursor:'pointer',color:on?'#6C5CE7':'#9092AD'}}>
            <TabIco id={t.id} on={on}/>
            <span style={{fontSize:10,fontWeight:600,fontFamily:"'Hanken Grotesk',sans-serif"}}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tab,setTab]=useState('today');
  const [layout,setLayout]=useState('A');
  const [filter,setFilter]=useState('all');
  const [added,setAdded]=useState({});
  const [stack,setStack]=useState([]);

  const push=s=>setStack(p=>[...p,s]);
  const pop=()=>setStack(p=>p.slice(0,-1));
  const top=stack[stack.length-1];
  const changeTab=t=>{setTab(t);setStack([]);};

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#FAFAFD',WebkitFontSmoothing:'antialiased'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {tab==='today'    &&<TodayScreen layout={layout} setLayout={setLayout} push={push} added={added} setAdded={setAdded}/>}
        {tab==='discover' &&<DiscoverScreen push={push}/>}
        {tab==='near'     &&<NearScreen push={push} filter={filter} setFilter={setFilter}/>}
        {tab==='anchors'  &&<AnchorsScreen push={push}/>}
        {tab==='search'   &&<SearchScreen push={push}/>}

        {top&&top.type==='place'  &&<PlaceDetailOverlay key={top.id}        id={top.id}        pop={pop} push={push}/>}
        {top&&top.type==='anchor' &&<AnchorDetailOverlay key={top.anchorId} anchorId={top.anchorId} pop={pop} push={push}/>}
        {top&&top.type==='trip'   &&<TripOverlay                            pop={pop} push={push}/>}
      </div>
      {stack.length===0&&<BottomNav tab={tab} setTab={changeTab}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
